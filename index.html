            });

            var enchTab = document.getElementById('tab-enchanting');
            enchTab.querySelectorAll('.price-table-row[data-recipes]').forEach(function(row) {
                if (recipeId === 'all') { row.style.display = 'flex'; return; }
                row.style.display = row.dataset.recipes.split(',').indexOf(recipeId) !== -1 ? 'flex' : 'none';
            });
            enchTab.querySelectorAll('.ench-filterable').forEach(function(panel) {
                var anyVisible = false;
                panel.querySelectorAll('.price-table-row[data-recipes]').forEach(function(row) {
                    if (row.style.display !== 'none') anyVisible = true;
                });
                panel.style.display = anyVisible ? '' : 'none';
            });

            localStorage.setItem(ENCH_RECIPE_KEY, recipeId);
        }

        // ===== ENCHANTING: SAVE / LOAD =====
        function enchSaveToStorage() {
            var data = {};
            document.querySelectorAll('#tab-enchanting input').forEach(function(input) { if (input.id) data[input.id] = input.value; });
            localStorage.setItem(ENCH_STORAGE_KEY, JSON.stringify(data));
        }

        function enchLoadFromStorage() {
            var stored = localStorage.getItem(ENCH_STORAGE_KEY);
            if (stored) {
                try {
                    var data = JSON.parse(stored);
                    Object.keys(data).forEach(function(id) {
                        var input = document.getElementById(id);
                        if (input && input.closest('#tab-enchanting')) input.value = data[id];
                    });
                } catch (e) { console.error('Failed to load enchanting data:', e); }
            }
        }

        // ===== LEATHERWORKING: UI GENERATION =====

        function lwInit() {
            Object.keys(lwNameToInput).forEach(function(k) { delete lwNameToInput[k]; });
            var view = window.AppLeatherworkingView.buildTabColumnsAndMain({
                recipes: LW_RECIPES,
                categoryOrder: LW_CATEGORY_ORDER,
                sanitizeId: sanitizeId,
                vendorDefaults: VENDOR_DEFAULTS,
                nameToInput: lwNameToInput,
                locksKey: LW_LOCKS_KEY
            });
            document.getElementById('lw-col-left').innerHTML = view.colLeft;
            document.getElementById('lw-col-right').innerHTML = view.colRight;
            document.getElementById('lw-main').innerHTML = view.main;
        }

        // ===== LEATHERWORKING: CALCULATE =====

        function computeLwIngCost(ing, recipeId, totalQty) {
            var baseId = 'lw_' + recipeId + '_ing_' + sanitizeId(ing.item);

            if (ing.craftFrom && ing.craftFrom.item) {
                var buyCost   = getVal('lw_mat_' + sanitizeId(ing.item)) * totalQty;
                var craftCost = getVal('lw_mat_' + sanitizeId(ing.craftFrom.item)) * ing.craftFrom.qty * totalQty;
                var useCraft  = craftCost < buyCost;
                var buyLbl = document.getElementById(baseId + '_buy_label');
                if (buyLbl) {
                    var buyPEl   = document.getElementById(baseId + '_buy_price');
                    var craftLbl = document.getElementById(baseId + '_craft_label');
                    var craftPEl = document.getElementById(baseId + '_craft_price');
                    buyLbl.className   = 'opt' + (!useCraft ? ' active' : '');
                    buyPEl.className   = 'opt' + (!useCraft ? ' active' : '');
                    buyPEl.innerHTML   = gold(buyCost)   + (!useCraft ? '<span class="using">USING</span>' : '');
                    craftLbl.className = 'opt' + (useCraft  ? ' active' : '');
                    craftPEl.className = 'opt' + (useCraft  ? ' active' : '');
                    craftPEl.innerHTML = gold(craftCost) + (useCraft  ? '<span class="using">USING</span>' : '');
                }
                return useCraft ? craftCost : buyCost;
            }

            var price = ing.type === 'vendor'
                ? getVal('lw_vendor_' + sanitizeId(ing.item))
                : getVal('lw_mat_' + sanitizeId(ing.item));
            var cost = (price || 0) * totalQty;
            var costEl = document.getElementById(baseId);
            if (costEl) costEl.textContent = gold(cost);
            return cost;
        }

        function lwCalculate() {
            var ahCutEl = document.getElementById('lw_ah_cut');
            if (!ahCutEl) return;
            var ahCutPct = parseFloat(ahCutEl.value) / 100 || 0.05;
            var results = [];

            LW_RECIPES.forEach(function(r) {
                var craftCost = 0;
                r.ingredients.forEach(function(ing) {
                    craftCost += computeLwIngCost(ing, r.id, ing.qty);
                });

                var salePrice = getVal('lw_sale_' + r.id);
                var ahCut     = salePrice * ahCutPct;
                var deposit   = getVal('lw_deposit_' + r.id);
                var profit    = salePrice - ahCut - craftCost;

                var el = function(id) { return document.getElementById(id); };
                var craftEl  = el('lw_' + r.id + '_craft_cost');    if (craftEl)  craftEl.textContent  = gold(craftCost);
                var saleDEl  = el('lw_' + r.id + '_sale_display');  if (saleDEl)  saleDEl.textContent  = gold(salePrice);
                var cutEl    = el('lw_' + r.id + '_ah_cut_display');if (cutEl)    cutEl.textContent    = gold(ahCut);
                var profitEl = el('lw_' + r.id + '_profit');
                if (profitEl) profitEl.innerHTML = '<span class="' + profitClass(profit) + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</span>';
                var depEl    = el('lw_' + r.id + '_deposit_note');  if (depEl) depEl.textContent = 'Deposit: ' + gold(deposit) + ' (lost if unsold)';

                results.push({ recipe: r, craftCost: craftCost, salePrice: salePrice, profit: profit });
            });

            lwResults = results;
            sortResults(results, lwSortBy);
            var tbody = '';
            results.forEach(function(r) {
                var cls = profitClass(r.profit);
                var pct = profitPctStr(r.profit, r.craftCost);
                tbody += '<tr class="lw-summary-row" data-recipe="' + r.recipe.id + '">' +
                    '<td>' + stalenessDotHtml(getLwRecipeStalenessInputs(r.recipe)) + r.recipe.name + '</td>' +
                    '<td>' + gold(r.craftCost) + '</td>' +
                    '<td>' + gold(r.salePrice) + '</td>' +
                    '<td class="' + cls + '">' + (r.profit >= 0 ? '+' : '') + gold(r.profit) + '</td>' +
                    '<td class="' + cls + '">' + pct + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(lwTsm, r.recipe.id, 'daily', 'lw') + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(lwTsm, r.recipe.id, 'avgPrice', 'lw') + '</td>' +
                '</tr>';
            });
            var summaryBody = document.getElementById('lw-summary-body');
            if (summaryBody && !(summaryBody.contains(document.activeElement) && document.activeElement.classList.contains('tsm-input'))) {
                summaryBody.innerHTML = tbody;
            }
            lwSaveToStorage();
            evCalculate();
        }

        // ===== LEATHERWORKING: SELECT =====
        function lwSelectRecipe(recipeId) {
            var dropdown = document.getElementById('lw-recipe-dropdown');
            syncRecipeDropdownSelection('#lw-recipe-dropdown', 'lw-recipe-dropdown-label', recipeId);
            if (dropdown) dropdown.classList.remove('open');
            var backBtn = document.getElementById('lw-recipe-back');
            if (backBtn) backBtn.style.display = recipeId === 'all' ? 'none' : '';

            var allView = document.getElementById('lw-view-all');
            if (allView) allView.style.display = recipeId === 'all' ? '' : 'none';
            document.querySelectorAll('.lw-view').forEach(function(v) {
                v.style.display = v.id === 'lw-view-' + recipeId ? '' : 'none';
            });

            var lwTab = document.getElementById('tab-leatherworking');
            lwTab.querySelectorAll('.price-table-row[data-recipes]').forEach(function(row) {
                if (recipeId === 'all') { row.style.display = 'flex'; return; }
                row.style.display = row.dataset.recipes.split(',').indexOf(recipeId) !== -1 ? 'flex' : 'none';
            });
            lwTab.querySelectorAll('.lw-filterable').forEach(function(panel) {
                var anyVisible = false;
                panel.querySelectorAll('.price-table-row[data-recipes]').forEach(function(row) {
                    if (row.style.display !== 'none') anyVisible = true;
                });
                panel.style.display = anyVisible ? '' : 'none';
            });

            localStorage.setItem(LW_RECIPE_KEY, recipeId);
        }

        // ===== LEATHERWORKING: SAVE / LOAD =====
        function lwSaveToStorage() {
            var data = {};
            document.querySelectorAll('#tab-leatherworking input').forEach(function(input) { if (input.id) data[input.id] = input.value; });
            localStorage.setItem(LW_STORAGE_KEY, JSON.stringify(data));
        }

        function lwLoadFromStorage() {
            var stored = localStorage.getItem(LW_STORAGE_KEY);
            if (stored) {
                try {
                    var data = JSON.parse(stored);
                    Object.keys(data).forEach(function(id) {
                        var input = document.getElementById(id);
                        if (input && input.closest('#tab-leatherworking')) input.value = data[id];
                    });
                } catch (e) { console.error('Failed to load leatherworking data:', e); }
            }
        }

        // ===== TAB SWITCHING =====
        function switchTab(tabName) {
            if (!TAB_NAV) return;
            TAB_NAV.switchTab(tabName);
        }

        function resetTabToMainView(tabName) {
            if (tabName === 'alchemy') alchSelectRecipe('all');
            else if (tabName === 'gear') gearSelectRecipe('all');
            else if (tabName === 'transmutes') txSelectRecipe('all');
            else if (tabName === 'cooking') cookSelectRecipe('all');
            else if (tabName === 'enchanting') enchSelectRecipe('all');
            else if (tabName === 'leatherworking') lwSelectRecipe('all');
        }

        function selectRecipeByContext(el, recipeId) {
            if (!RECIPE_ROUTER) return;
            RECIPE_ROUTER.selectByElement(el, recipeId);
        }

        function closeRecipeDropdownsOutside(targetEl) {
            var dropdownIds = [
                'recipe-dropdown',
                'gear-recipe-dropdown',
                'tx-recipe-dropdown',
                'cook-recipe-dropdown',
                'ench-recipe-dropdown',
                'lw-recipe-dropdown'
            ];
            dropdownIds.forEach(function(id) {
                var dd = document.getElementById(id);
                if (dd && !dd.contains(targetEl)) dd.classList.remove('open');
            });
        }

        function readStoredJson(key, fallback) {
            try { return JSON.parse(localStorage.getItem(key)) || fallback; }
            catch (e) { return fallback; }
        }

        function readStoredNumber(key, fallback) {
            var v = parseFloat(localStorage.getItem(key));
            return Number.isFinite(v) ? v : fallback;
        }

        function readStoredInt(key, fallback) {
            var v = parseInt(localStorage.getItem(key), 10);
            return Number.isFinite(v) ? v : fallback;
        }

        function handleRecipeNavigationClick(target) {
            var backBtn = target.closest('.recipe-back-btn');
            if (backBtn) { selectRecipeByContext(backBtn, 'all'); return true; }

            var ddTrigger = target.closest('.recipe-dropdown-trigger');
            if (ddTrigger) {
                var dd = ddTrigger.closest('.recipe-dropdown');
                if (dd) dd.classList.toggle('open');
                return true;
            }

            var recipeItem = target.closest('.recipe-item');
            if (recipeItem) {
                selectRecipeByContext(recipeItem, recipeItem.dataset.recipe);
                return true;
            }

            closeRecipeDropdownsOutside(target);

            var summaryRow = target.closest('.alch-summary-row, .gear-summary-row, .tx-summary-row, .cook-summary-row, .ench-summary-row, .lw-summary-row');
            if (summaryRow) { selectRecipeByContext(summaryRow, summaryRow.dataset.recipe); return true; }

            var tabBtn = target.closest('.tab-btn');
            if (tabBtn) { TAB_NAV.handleTabButtonClick(tabBtn); return true; }

            return false;
        }

        function calculateCoreTabs() {
            window.AppRuntimeTabs.calculateCoreTabs(TAB_REGISTRY);
        }

        function calculateAllTabs() {
            window.AppRuntimeTabs.calculateAllTabs(TAB_REGISTRY);
        }

        // ===== INITIALIZATION =====

        TAB_NAV = window.AppTabNavigation.createTabNavigation({
            storageKey: TAB_STORAGE_KEY,
            onResetTabToMainView: resetTabToMainView
        });
        RECIPE_ROUTER = window.AppRecipeRouting.createRecipeRouter({
            routes: [
                { selector: '#tab-transmutes', select: txSelectRecipe },
                { selector: '#tab-gear', select: gearSelectRecipe },
                { selector: '#tab-cooking', select: cookSelectRecipe },
                { selector: '#tab-enchanting', select: enchSelectRecipe },
                { selector: '#tab-leatherworking', select: lwSelectRecipe }
            ],
            defaultSelect: alchSelectRecipe
        });

        evInit();
        window.AppRuntimeTabs.registerDefaultTabs(TAB_REGISTRY, {
            alchInit: alchInit,
            alchLoadFromStorage: alchLoadFromStorage,
            alchCalculate: alchCalculate,
            gearInit: gearInit,
            gearLoadFromStorage: gearLoadFromStorage,
            gearCalculate: gearCalculate,
            txInit: txInit,
            txLoadFromStorage: txLoadFromStorage,
            txCalculate: txCalculate,
            cookInit: cookInit,
            cookLoadFromStorage: cookLoadFromStorage,
            cookCalculate: cookCalculate,
            enchInit: enchInit,
            enchLoadFromStorage: enchLoadFromStorage,
            enchCalculate: enchCalculate,
            lwInit: lwInit,
            lwLoadFromStorage: lwLoadFromStorage,
            lwCalculate: lwCalculate
        });
        TAB_REGISTRY.initAll();
        consumablesInit();
        cdInit();

        TAB_REGISTRY.loadAll();

        syncAllSharedPrices();

        document.addEventListener('click', function(e) {
            var consHeader = e.target.closest('.cons-class-header');
            if (consHeader) {
                consHeader.closest('.cons-class-card').classList.toggle('cons-collapsed');
                return;
            }

            var craftableNode = e.target.closest('.tree-craftable');
            if (craftableNode) {
                var detailId = craftableNode.dataset.detail;
                var detail = document.getElementById(detailId);
                if (detail) {
                    var isOpen = detail.classList.toggle('open');
                    craftableNode.classList.toggle('expanded', isOpen);
                }
                return;
            }

            var gscBtn = e.target.closest('.gsc-btn');
            if (gscBtn) {
                e.preventDefault();
                var delta = parseFloat(gscBtn.dataset.delta);
                var group = gscBtn.closest('.gsc-group');
                var inputId = group ? group.dataset.input : gscBtn.dataset.input;
                var input = document.getElementById(inputId);
                var value = parseFloat(input.value) || 0;
                value = Math.max(0, value + delta);
                value = Math.round(value * 10000) / 10000;
                input.value = value;
                updateGSCDisplay(inputId);
                autoSizeInput(input);
                syncSharedPrice(inputId);
                calculateCoreTabs();
                return;
            }

            var collapsibleH2 = e.target.closest('h2.collapsible');
            if (collapsibleH2) {
                var panelId = collapsibleH2.dataset.panel;
                var body = document.querySelector('[data-panel-body="' + panelId + '"]');
                if (body) {
                    var isCollapsed = collapsibleH2.classList.toggle('collapsed');
                    body.classList.toggle('collapsed', isCollapsed);
                    var collapsed = {};
                    try { collapsed = JSON.parse(localStorage.getItem(ALCH_COLLAPSED_KEY)) || {}; } catch(e) {}
                    if (isCollapsed) collapsed[panelId] = true;
                    else delete collapsed[panelId];
                    localStorage.setItem(ALCH_COLLAPSED_KEY, JSON.stringify(collapsed));
                }
                return;
            }

            var lockBtn = e.target.closest('.lock-btn');
            if (lockBtn) {
                e.preventDefault();
                toggleLock(lockBtn.dataset.input);
                return;
            }

            var manageBtn = e.target.closest('#recipe-manage-btn');
            if (manageBtn) {
                var overlay = document.getElementById('recipe-manage-overlay');
                if (overlay) overlay.remove();
                document.getElementById('tab-alchemy').insertAdjacentHTML('beforeend', buildManageRecipesHTML());
                document.getElementById('recipe-manage-overlay').classList.add('open');
                return;
            }

            var closeManage = e.target.closest('#recipe-manage-close');
            if (closeManage) {
                document.getElementById('recipe-manage-overlay').classList.remove('open');
                return;
            }

            if (e.target.id === 'recipe-manage-overlay') {
                e.target.classList.remove('open');
                return;
            }

            if (e.target.id === 'proc-modal-close-btn' || e.target.id === 'proc-overlay') {
                closeProcModal();
                return;
            }

            if (handleRecipeNavigationClick(e.target)) return;
        });

        document.addEventListener('change', function(e) {
            var checkbox = e.target.closest('[data-recipe-manage]');
            if (checkbox) {
                var hidden = getHiddenRecipes();
                if (checkbox.checked) {
                    delete hidden[checkbox.dataset.recipeManage];
                } else {
                    hidden[checkbox.dataset.recipeManage] = true;
                }
                setHiddenRecipes(hidden);
                applyHiddenRecipes();
            }
        });

        document.addEventListener('input', function(e) {
            if (e.target.classList && e.target.classList.contains('tsm-input') && e.target.dataset.tsmRecipe) {
                var tab = e.target.dataset.tsmTab, recipe = e.target.dataset.tsmRecipe, field = e.target.dataset.tsmField, val = e.target.value;
                if (tab === 'alch') saveTsmField(alchTsm, ALCH_TSM_KEY, recipe, field, val);
                else if (tab === 'gear') saveTsmField(gearTsm, GEAR_TSM_KEY, recipe, field, val);
                else if (tab === 'tx') saveTsmField(txTsm, TX_TSM_KEY, recipe, field, val);
                else if (tab === 'cook') saveTsmField(cookTsm, COOK_TSM_KEY, recipe, field, val);
                else if (tab === 'ench') saveTsmField(enchTsm, ENCH_TSM_KEY, recipe, field, val);
                else if (tab === 'lw') saveTsmField(lwTsm, LW_TSM_KEY, recipe, field, val);
                if (field === 'avgPrice') {
                    var gscEl = e.target.nextElementSibling;
                    if (gscEl && gscEl.classList.contains('tsm-gsc-preview')) {
                        var numVal = parseFloat(val) || 0;
                        gscEl.innerHTML = numVal > 0 ? tsmGscHtml(numVal) : '';
                    }
                }
                var ageEl = e.target.closest('td').querySelector('.tsm-age');
                if (ageEl) { ageEl.dataset.ts = Date.now(); ageEl.textContent = 'just now'; }
            }
        });

        var tabInputHandlers = [
            { id: 'tab-alchemy', fn: function(inputId, target) { updateGSCDisplay(inputId); autoSizeInput(target); syncSharedPrice(inputId); calculateCoreTabs(); } },
            { id: 'tab-gear', fn: function(inputId, target) { updateGSCDisplay(inputId); autoSizeInput(target); syncSharedPrice(inputId); calculateCoreTabs(); } },
            { id: 'tab-transmutes', fn: function(inputId, target) { updateGSCDisplay(inputId); autoSizeInput(target); syncSharedPrice(inputId); calculateCoreTabs(); } },
            { id: 'tab-cooking', fn: function(inputId, target) { updateGSCDisplay(inputId); autoSizeInput(target); cookCalculate(); } },
            { id: 'tab-enchanting', fn: function(inputId, target) { updateGSCDisplay(inputId); autoSizeInput(target); syncSharedPrice(inputId); enchCalculate(); } },
            { id: 'tab-leatherworking', fn: function(inputId, target) { updateGSCDisplay(inputId); autoSizeInput(target); lwCalculate(); } }
        ];
        ['input', 'change', 'keyup'].forEach(function(eventType) {
            tabInputHandlers.forEach(function(binding) {
                var el = document.getElementById(binding.id);
                if (!el) return;
                el.addEventListener(eventType, function(e) {
                    if (e.target.tagName === 'INPUT' && e.target.id) {
                        binding.fn(e.target.id, e.target);
                    }
                });
            });
        });

        updateAllGSCDisplays();
        autoSizeAllInputs();
        updateAllLockDisplays();

        priceTimestamps = readStoredJson(PRICE_TIMESTAMPS_KEY, {});
        lastImportBatchTime = readStoredInt(LAST_IMPORT_BATCH_KEY, 0);
        alchProcRate = readStoredNumber(ALCH_PROC_KEY, 20);
        alchBatchSize = readStoredInt(ALCH_BATCH_KEY, 1);
        evSortBy = localStorage.getItem(EV_SORT_KEY) || 'profit';
        evView = localStorage.getItem(EV_VIEW_KEY) || 'flat';
        evHidden = readStoredJson(EV_HIDDEN_KEY, {});
        alchTsm = readStoredJson(ALCH_TSM_KEY, {});
        gearTsm = readStoredJson(GEAR_TSM_KEY, {});
        txTsm = readStoredJson(TX_TSM_KEY, {});
        cookTsm = readStoredJson(COOK_TSM_KEY, {});
        enchTsm = readStoredJson(ENCH_TSM_KEY, {});
        lwTsm = readStoredJson(LW_TSM_KEY, {});
        buildAhInputMap();
        buildAllNameToInputs();

        calculateAllTabs();
        if (alchBatchSize !== 1) setAlchBatch(alchBatchSize);

        injectStalenessDotsToRows();

        document.getElementById('is-overlay').addEventListener('click', function(e) {
            if (e.target.id === 'is-overlay') closeIngSearch();
        });

        var initialTab = localStorage.getItem(TAB_STORAGE_KEY) || 'everything';
        if (initialTab === 'bags') initialTab = 'gear';
        switchTab(initialTab);
        document.querySelectorAll('.ev-sort-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.sort === evSortBy); });
        document.querySelectorAll('.ev-view-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.view === evView); });
        setInterval(function() {
            updateStalenessDotsOnRows();
            calculateAllTabs();
        }, 30000);

        alchSelectRecipe(localStorage.getItem(ALCH_RECIPE_KEY) || 'all');
        gearSelectRecipe(localStorage.getItem(GEAR_RECIPE_KEY) || 'all');
        txSelectRecipe(localStorage.getItem(TX_RECIPE_KEY) || 'all');
        cookSelectRecipe(localStorage.getItem(COOK_RECIPE_KEY) || 'all');
        enchSelectRecipe(localStorage.getItem(ENCH_RECIPE_KEY) || 'all');
        lwSelectRecipe(localStorage.getItem(LW_RECIPE_KEY) || 'all');

        applyHiddenRecipes();

        try {
            var collapsed = JSON.parse(localStorage.getItem(ALCH_COLLAPSED_KEY)) || {};
            Object.keys(collapsed).forEach(function(panelId) {
                var h2 = document.querySelector('h2.collapsible[data-panel="' + panelId + '"]');
                var body = document.querySelector('[data-panel-body="' + panelId + '"]');
                if (h2 && body) {
                    h2.classList.add('collapsed');
                    body.classList.add('collapsed');
                }
            });
        } catch(e) {}
    </script>
