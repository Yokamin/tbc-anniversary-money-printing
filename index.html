<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <title>TBC Crafting Calculator</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: none;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 12px;
            font-size: 1.5em;
        }
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #3a3a5c;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.15s;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .tab-btn:hover { color: #ccc; }
        .tab-btn:focus-visible {
            outline: 2px solid #7c6fcd;
            outline-offset: 2px;
        }
        .tab-btn.active { color: #ffd700; border-bottom-color: #ffd700; }
        .layout {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel {
            background: #252540;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #3a3a5c;
        }
        .panel h2 {
            font-size: 0.85em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .panel h2.collapsible {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }
        .panel h2.collapsible:hover {
            color: #ccc;
        }
        .panel h2.collapsible .collapse-arrow {
            font-size: 0.7em;
            transition: transform 0.15s;
        }
        .panel h2.collapsible.collapsed .collapse-arrow {
            transform: rotate(-90deg);
        }
        .panel h2.collapsible.collapsed {
            margin-bottom: 0;
        }
        .panel-body.collapsed {
            display: none;
        }
        .input-row {
            margin-bottom: 12px;
        }
        .input-row:last-child { margin-bottom: 0; }
        .input-row label {
            display: block;
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 4px;
        }
        .price-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .price-control input {
            min-width: 40px;
            width: auto;
            padding: 6px;
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            color: #4ade80;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            text-align: left;
            appearance: textfield;
            -moz-appearance: textfield;
        }
        .price-control input::-webkit-outer-spin-button,
        .price-control input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .price-control input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .gsc-group {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        .gsc-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .gsc-unit .gsc-btn {
            width: 20px;
            height: 14px;
            background: #3a3a5c;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 0.6em;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gsc-unit .gsc-btn:hover {
            background: #4a4a6c;
            color: #fff;
        }
        .gsc-unit .gsc-btn:first-child {
            border-radius: 3px 3px 0 0;
        }
        .gsc-unit .gsc-btn:last-child {
            border-radius: 0 0 3px 3px;
        }
        .gsc-unit .gsc-val {
            background: #1a1a2e;
            padding: 2px 6px;
            font-size: 0.75em;
            font-family: 'Consolas', monospace;
            min-width: 32px;
            text-align: center;
            white-space: nowrap;
        }
        .gsc-val.gold { color: #ffd700; }
        .gsc-val.silver { color: #c0c0c0; }
        .gsc-val.copper { color: #cd7f32; }
        .main-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .tier {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .card {
            background: #252540;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #3a3a5c;
        }
        .card h3 {
            font-size: 1em;
            color: #ffd700;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a5c;
        }
        .card-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 6px;
        }
        .card-row:last-child { margin-bottom: 0; }
        .card-row .label { color: #999; }
        .card-row .value { color: #eee; font-family: 'Consolas', monospace; }
        .card-row.highlight {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #3a3a5c;
        }
        .best-source {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .best-source.craft { background: #065f46; color: #6ee7b7; }
        .best-source.buy { background: #1e40af; color: #93c5fd; }
        .best-source.equal { background: #4a4a4a; color: #ccc; }
        .profit { color: #4ade80; font-weight: bold; }
        .loss { color: #f87171; font-weight: bold; }
        .neutral { color: #999; }
        .savings { font-size: 0.8em; color: #888; margin-left: 8px; }
        .tier-label {
            font-size: 0.75em;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .recipe {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 10px;
        }
        .sourcing {
            background: #1a1a2e;
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        .sourcing-title {
            color: #888;
            font-size: 0.75em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .sourcing-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .sourcing-row:last-child { margin-bottom: 0; }
        .sourcing-row .opt {
            color: #666;
        }
        .sourcing-row .opt.active {
            color: #4ade80;
            font-weight: bold;
        }
        .sourcing-row .using {
            font-size: 0.75em;
            color: #4ade80;
            margin-left: 6px;
        }
        .sourcing-row.fixed {
            color: #888;
        }
        .sourcing-row.fixed .cost {
            color: #ccc;
            font-family: 'Consolas', monospace;
        }
        .deposit-note {
            font-size: 0.8em;
            color: #f59e0b;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #3a3a5c;
        }
        .lock-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7em;
            opacity: 0.3;
            padding: 0;
            margin-left: 4px;
            vertical-align: middle;
            line-height: 1;
            transition: opacity 0.15s;
        }
        .lock-btn:hover {
            opacity: 0.7;
        }
        .lock-btn.locked {
            opacity: 1;
        }
        .import-panel textarea {
            width: 100%;
            height: 80px;
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            color: #eee;
            font-family: 'Consolas', monospace;
            font-size: 0.75em;
            padding: 8px;
            resize: vertical;
            margin-bottom: 8px;
        }
        .import-panel textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        .import-btn {
            background: #3a3a5c;
            border: none;
            border-radius: 4px;
            color: #eee;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 0.85em;
            width: 100%;
        }
        .import-btn:hover {
            background: #4a4a6c;
        }
        .recipe-list { margin-top: 4px; }
        .crafting-overview {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: start;
        }
        .crafting-trees {
            min-width: 0;
        }
        .crafting-side {
            width: 340px;
            flex-shrink: 0;
            position: sticky;
            top: 20px;
        }
        .craft-tree {
            font-size: 0.88em;
            margin-bottom: 10px;
        }
        .tree-node {
            display: flex;
            align-items: baseline;
            padding: 3px 0;
        }
        .tree-prefix {
            color: #555;
            font-family: 'Consolas', monospace;
            white-space: pre;
            flex-shrink: 0;
        }
        .tree-name {
            color: #ccc;
            flex: 1;
            white-space: nowrap;
        }
        .tree-cost {
            font-family: 'Consolas', monospace;
            color: #eee;
            margin-left: 12px;
            white-space: nowrap;
        }
        .tree-unit {
            color: #888;
            font-size: 0.85em;
            font-family: 'Consolas', monospace;
        }
        .tree-vs {
            display: flex;
            gap: 10px;
            margin-left: 12px;
            flex-shrink: 0;
        }
        .tree-opt {
            font-family: 'Consolas', monospace;
            font-size: 0.92em;
            white-space: nowrap;
        }
        .tree-opt.better { color: #4ade80; }
        .tree-opt.worse { color: #666; }
        .tree-craftable {
            cursor: pointer;
        }
        .tree-craftable:hover .tree-name {
            color: #fff;
        }
        .tree-craftable .tree-name::after {
            content: ' ▸';
            color: #555;
            font-size: 0.8em;
        }
        .tree-craftable.expanded .tree-name::after {
            content: ' ▾';
            color: #888;
        }
        .tree-detail {
            display: none;
            background: #1e1e36;
            border-left: 2px solid #3a3a5c;
            padding: 6px 12px;
            border-radius: 0 4px 4px 0;
            font-size: 0.92em;
            margin: 2px 0 4px;
        }
        .tree-detail.open {
            display: block;
        }
        .tree-detail.depth-1 { margin-left: 28px; }
        .tree-detail.depth-2 { margin-left: 60px; }
        .tree-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }
        .tree-detail-row .td-label { color: #999; font-size: 0.9em; }
        .tree-detail-row .td-value { font-family: 'Consolas', monospace; color: #eee; }
        .recipe-item {
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85em;
            color: #ccc;
            margin-bottom: 2px;
        }
        .recipe-item:hover { background: #3a3a5c; }
        .recipe-item.active { background: #3a3a5c; color: #ffd700; }
        .recipe-category {
            font-size: 0.75em;
            text-transform: uppercase;
            color: #666;
            padding: 10px 10px 4px;
            letter-spacing: 0.5px;
        }
        .price-table {
            width: 100%;
        }
        .price-table-row {
            display: flex;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #2a2a44;
            gap: 6px;
        }
        .staleness-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            align-self: center;
            vertical-align: middle;
            margin-right: 5px;
        }
        .price-table-row:last-child { border-bottom: none; }
        .price-table-row .pt-name {
            flex: 1;
            font-size: 0.82em;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .price-table-row .lock-btn {
            margin-left: 0;
        }
        .price-table-row .price-control {
            gap: 0;
        }
        .price-table-row .price-control input {
            width: 70px;
            min-width: 50px;
            padding: 3px 5px;
            font-size: 0.82em;
            text-align: right;
        }
        .price-table-row .gsc-group {
            display: flex;
            gap: 1px;
            flex-shrink: 0;
        }
        .price-table-row .gsc-val {
            font-size: 0.72em;
            font-family: 'Consolas', monospace;
            padding: 0 2px;
            white-space: nowrap;
        }
        .recipe-dropdown {
            position: relative;
        }
        .recipe-dropdown-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            color: #ffd700;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .recipe-dropdown-trigger:hover {
            border-color: #ffd700;
        }
        .recipe-dropdown-trigger:focus-visible,
        .sort-btn:focus-visible,
        .toolbar-btn:focus-visible,
        .toolbar-reset-btn:focus-visible {
            outline: 2px solid #7c6fcd;
            outline-offset: 2px;
        }
        .recipe-dropdown-trigger .dd-arrow {
            font-size: 0.7em;
            color: #888;
            transition: transform 0.15s;
        }
        .recipe-dropdown.open .dd-arrow {
            transform: rotate(180deg);
        }
        .recipe-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 100;
            margin-top: 4px;
            background: #252540;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .recipe-dropdown.open .recipe-dropdown-menu {
            display: block;
        }
        .recipe-dropdown-menu .recipe-item {
            padding: 7px 12px;
            cursor: pointer;
            font-size: 0.85em;
            color: #ccc;
            border-bottom: 1px solid #2a2a44;
        }
        .recipe-dropdown-menu .recipe-item:last-child { border-bottom: none; }
        .recipe-dropdown-menu .recipe-item:hover { background: #3a3a5c; }
        .recipe-dropdown-menu .recipe-item.active { color: #ffd700; background: #2a2a44; }
        .recipe-dropdown-menu .recipe-category {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #666;
            padding: 8px 12px 3px;
            letter-spacing: 0.5px;
        }
        .recipe-dropdown-wrapper {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .recipe-dropdown-wrapper .recipe-dropdown {
            flex: 1;
        }
        .recipe-manage-btn {
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            color: #888;
            font-size: 1.1em;
            cursor: pointer;
            padding: 0 10px;
            transition: border-color 0.15s, color 0.15s;
            display: flex;
            align-items: center;
        }
        .recipe-manage-btn:hover {
            border-color: #ffd700;
            color: #ffd700;
        }
        .recipe-back-btn {
            background: #1a1a2e;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            color: #aaa;
            font-size: 0.8em;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            cursor: pointer;
            padding: 0 10px;
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s;
            display: flex;
            align-items: center;
        }
        .recipe-back-btn:hover {
            border-color: #ffd700;
            color: #ffd700;
        }
        .recipe-manage-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .recipe-manage-overlay.open {
            display: flex;
        }
        .recipe-manage-modal {
            background: #1e1e35;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            padding: 0;
            max-width: 480px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .recipe-manage-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px 12px;
            border-bottom: 1px solid #2a2a44;
            flex-shrink: 0;
        }
        .recipe-manage-modal h2 {
            font-size: 0.95em;
            color: #ffd700;
            margin: 0;
        }
        .recipe-manage-close {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0 4px;
            line-height: 1;
            font-family: inherit;
        }
        .recipe-manage-close:hover { color: #fff; }
        .recipe-manage-hint {
            font-size: 0.8em;
            color: #777;
            padding: 10px 18px;
            border-bottom: 1px solid #2a2a44;
            flex-shrink: 0;
        }
        .recipe-manage-cat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px 5px;
            margin-top: 4px;
        }
        .recipe-manage-cat {
            font-size: 0.76em;
            text-transform: uppercase;
            color: #a78bfa;
            letter-spacing: 0.6px;
            font-weight: bold;
        }
        .recipe-manage-cat-btns { display: flex; gap: 5px; }
        .recipe-manage-cat-btn {
            background: #1a1a30;
            border: 1px solid #3a3a5c;
            color: #888;
            font-size: 0.72em;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
        }
        .recipe-manage-cat-btn:hover { color: #ccc; border-color: #5a5a8c; }
        .recipe-manage-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 18px 4px 30px;
            font-size: 0.87em;
            color: #ccc;
            cursor: pointer;
        }
        .recipe-manage-item:hover { color: #fff; background: #1a1a30; }
        .recipe-manage-item input[type="checkbox"] {
            accent-color: #a78bfa;
            width: 14px;
            height: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .recipe-manage-scroll { overflow-y: auto; flex: 1; padding-bottom: 12px; }
        .proc-btn {
            font-size: 0.68em;
            padding: 1px 5px;
            background: #2a1848;
            border: 1px solid #5a3a8c;
            border-radius: 3px;
            color: #c4b5fd;
            cursor: pointer;
            margin-left: 6px;
            vertical-align: middle;
            line-height: 1.5;
            font-family: inherit;
        }
        .proc-btn:hover { background: #3a2858; border-color: #7c6fcd; }
        .proc-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.65);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }
        .proc-overlay.open { display: flex; }
        .proc-modal {
            background: #1e1e38;
            border: 1px solid #4a3a7c;
            border-radius: 8px;
            width: 560px;
            max-width: 95vw;
            box-shadow: 0 16px 48px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        .proc-modal-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px 11px;
            border-bottom: 1px solid #3a3a5c;
            background: #252540;
        }
        .proc-modal-title { font-size: 0.9em; color: #c4b5fd; font-weight: bold; }
        .proc-modal-close-btn {
            background: none; border: none; color: #666; font-size: 1.3em;
            cursor: pointer; padding: 0 2px; line-height: 1;
        }
        .proc-modal-close-btn:hover { color: #fff; }
        .proc-modal-body { padding: 16px 18px; }
        .proc-input-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
        }
        .proc-input-row label { font-size: 0.82em; color: #aaa; min-width: 72px; }
        .proc-input-row input[type=number] {
            background: #252540;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            color: #eee;
            padding: 4px 8px;
            font-size: 0.88em;
            font-family: 'Consolas', monospace;
            appearance: textfield;
            -moz-appearance: textfield;
        }
        .proc-input-row input[type=number]::-webkit-inner-spin-button,
        .proc-input-row input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        .proc-input-row input[type=number]:focus { outline: none; border-color: #7c6fcd; }
        #proc-crafts { width: 90px; }
        #proc-rate-input { width: 60px; }
        [id^="proc-il-crafts-"] { width: 90px; }
        .proc-stepper-wrap { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

    <script>
        // ===== STORAGE KEYS =====
        const {
            ALCH_STORAGE_KEY, ALCH_LOCKS_KEY, TAB_STORAGE_KEY, ALCH_RECIPE_KEY, ALCH_HIDDEN_KEY, ALCH_COLLAPSED_KEY,
            ENCH_STORAGE_KEY, ENCH_LOCKS_KEY, ENCH_RECIPE_KEY, LW_STORAGE_KEY, LW_LOCKS_KEY, LW_RECIPE_KEY,
            ALCH_TSM_KEY, GEAR_TSM_KEY, TX_TSM_KEY, COOK_TSM_KEY, ENCH_TSM_KEY, LW_TSM_KEY,
            ALCH_PROC_KEY, ALCH_BATCH_KEY, EV_SORT_KEY, EV_VIEW_KEY, EV_HIDDEN_KEY
        } = window.AppConstants.STORAGE_KEYS;

        // ===== TSM NOTES =====
        var alchTsm = {}, gearTsm = {}, txTsm = {}, cookTsm = {}, enchTsm = {}, lwTsm = {};
        var alchProcRate = 20;
        var alchBatchSize = 1;
        var alchResults = [];
        var gearResults = [];
        var txSummaryRows = [];
        var cookResults = [];
        var enchResults = [];
        var lwResults = [];
        var evSortBy = 'profit';
        var evView = 'flat';
        var evHidden = {};
        var evSections = [];
        var procModalRecipeId = null;

        // ===== SORT STATE =====
        var alchSortBy = 'profit', gearSortBy = 'profit', txSortBy = 'profit', cookSortBy = 'profit', enchSortBy = 'profit', lwSortBy = 'profit';

        // ===== PRICE STALENESS TRACKING =====
        const PRICE_TIMESTAMPS_KEY = 'tbc_price_timestamps';
        const LAST_IMPORT_BATCH_KEY = 'tbc_last_import_batch';
        var priceTimestamps = {};
        var lastImportBatchTime = 0;
        var AH_INPUT_TO_NAME = {};
        var STALENESS_EXEMPT_ITEMS = new Set(['Netherweave Cloth']);
        var STALENESS_COLOR_ORDER = ['#888','#f87171','#fb923c','#fbbf24','#4ade80','#60a5fa'];

        function getStalenessColor(inputId) {
            var itemName = AH_INPUT_TO_NAME[inputId];
            var ts = itemName ? priceTimestamps[itemName] : undefined;
            if (ts === undefined || ts === null) return '#888';
            if (lastImportBatchTime > 0 && ts >= lastImportBatchTime) return '#60a5fa';
            var age = Date.now() - ts;
            if (age < 5 * 60 * 1000)  return '#4ade80';
            if (age < 30 * 60 * 1000) return '#fbbf24';
            if (age < 60 * 60 * 1000) return '#fb923c';
            return '#f87171';
        }

        function getWorstStalenessColor(inputIds) {
            if (!inputIds || inputIds.length === 0) return null;
            var worstIdx = STALENESS_COLOR_ORDER.length;
            inputIds.forEach(function(id) {
                var color = getStalenessColor(id);
                var idx = STALENESS_COLOR_ORDER.indexOf(color);
                if (idx !== -1 && idx < worstIdx) worstIdx = idx;
            });
            return worstIdx < STALENESS_COLOR_ORDER.length ? STALENESS_COLOR_ORDER[worstIdx] : null;
        }

        function stalenessDotHtml(inputIds) {
            var color = getWorstStalenessColor(inputIds);
            if (!color) return '';
            return '<span class="staleness-dot" style="background:' + color + '" aria-hidden="true"></span>';
        }

        // ===== PROFIT % / SORT / TSM HELPERS =====
        function profitPctStr(profit, craftCost) {
            if (!craftCost || craftCost <= 0) return '—';
            return (profit / craftCost * 100).toFixed(1) + '%';
        }

        function tsmAge(ts) {
            if (!ts) return '';
            var age = Date.now() - ts;
            if (age < 60000) return 'just now';
            if (age < 3600000) return Math.floor(age / 60000) + 'm ago';
            if (age < 86400000) return Math.floor(age / 3600000) + 'h ago';
            if (age < 604800000) return Math.floor(age / 86400000) + 'd ago';
            return Math.floor(age / 604800000) + 'w ago';
        }

        function tsmGscHtml(val) {
            var gsc = toGSC(val);
            var h = '';
            if (gsc.g > 0) h += '<span style="color:#ffd700">' + gsc.g + 'g</span> ';
            if (gsc.s > 0 || gsc.g > 0) h += '<span style="color:#c0c0c0">' + gsc.s + 's</span> ';
            h += '<span style="color:#cd7f32">' + gsc.c + 'c</span>';
            return h;
        }

        function tsmInputHtml(tsmObj, recipeId, field, tsmTab) {
            var data = tsmObj[recipeId] || {};
            var val = (data[field] || '').replace(/"/g, '&quot;');
            var ts = data[field + 'Ts'] || 0;
            var ageHtml = '<span class="tsm-age" data-ts="' + ts + '">' + (ts ? tsmAge(ts) : '') + '</span>';
            var attrs = ' data-tsm-tab="' + tsmTab + '" data-tsm-recipe="' + recipeId + '" data-tsm-field="' + field + '" tabindex="-1"';
            if (field === 'daily') {
                return '<div class="tsm-wrap"><input type="number" class="tsm-input tsm-daily" min="0" max="9999" step="1" value="' + val + '" placeholder="—"' + attrs + '>' + ageHtml + '</div>';
            } else {
                var numVal = parseFloat(data[field] || '0') || 0;
                var gscHtml = '<span class="tsm-gsc-preview">' + (numVal > 0 ? tsmGscHtml(numVal) : '') + '</span>';
                return '<div class="tsm-wrap"><input type="number" class="tsm-input tsm-price" min="0" step="0.0001" value="' + val + '" placeholder="—"' + attrs + '>' + gscHtml + ageHtml + '</div>';
            }
        }

        function saveTsmField(tsmObj, storageKey, recipeId, field, value) {
            if (!tsmObj[recipeId]) tsmObj[recipeId] = {};
            tsmObj[recipeId][field] = value;
            tsmObj[recipeId][field + 'Ts'] = Date.now();
            try { localStorage.setItem(storageKey, JSON.stringify(tsmObj)); } catch(e) {}
        }

        function setSortBy(tab, by) {
            if (tab === 'alch') { alchSortBy = by; alchCalculate(); }
            else if (tab === 'gear') { gearSortBy = by; gearCalculate(); }
            else if (tab === 'tx') { txSortBy = by; txCalculate(); }
            else if (tab === 'cook') { cookSortBy = by; cookCalculate(); }
            else if (tab === 'ench') { enchSortBy = by; enchCalculate(); }
            else if (tab === 'lw') { lwSortBy = by; lwCalculate(); }
            updateSortToggle(tab);
        }

        function updateSortToggle(tab) {
            var sortBy = tab === 'alch' ? alchSortBy : tab === 'gear' ? gearSortBy : tab === 'tx' ? txSortBy : tab === 'ench' ? enchSortBy : tab === 'lw' ? lwSortBy : cookSortBy;
            ['profit', 'pct'].forEach(function(by) {
                var btn = document.getElementById(tab + '-sort-' + by);
                if (btn) btn.classList.toggle('active', sortBy === by);
            });
        }

        function sortResults(arr, sortBy, profitKey, costKey) {
            profitKey = profitKey || 'profit';
            costKey = costKey || 'craftCost';
            arr.sort(function(a, b) {
                if (sortBy === 'pct') {
                    var ca = a[costKey], cb = b[costKey];
                    if (ca <= 0 && cb <= 0) return b[profitKey] - a[profitKey];
                    if (ca <= 0) return 1;
                    if (cb <= 0) return -1;
                    return (b[profitKey] / cb) - (a[profitKey] / ca);
                }
                return b[profitKey] - a[profitKey];
            });
        }

        function procStep(delta) {
            var inp = document.getElementById('proc-crafts');
            if (!inp) return;
            inp.value = Math.max(1, (parseInt(inp.value) || 100) + delta);
            procModalUpdate();
        }

        function procResetCrafts() {
            var inp = document.getElementById('proc-crafts');
            if (inp) inp.value = 100;
            procModalUpdate();
        }

        function openProcModal(recipeId) {
            procModalRecipeId = recipeId;
            var r = ALCHEMY_RECIPES.find(function(x) { return x.id === recipeId; });
            var titleEl = document.getElementById('proc-modal-title');
            if (titleEl && r) titleEl.textContent = r.name;
            var rateInput = document.getElementById('proc-rate-input');
            if (rateInput) rateInput.value = alchProcRate;
            var overlay = document.getElementById('proc-overlay');
            if (overlay) overlay.classList.add('open');
            procModalUpdate();
        }

        function closeProcModal() {
            var overlay = document.getElementById('proc-overlay');
            if (overlay) overlay.classList.remove('open');
            procModalRecipeId = null;
        }

        function saveProcRate() {
            var inp = document.getElementById('proc-rate-input');
            alchProcRate = parseFloat((inp || {}).value) || 20;
            localStorage.setItem(ALCH_PROC_KEY, alchProcRate);
            procModalUpdate();
            ALCHEMY_RECIPES.forEach(function(r) {
                if (r.category !== 'transmute') procIlUpdate(r.id);
            });
        }

        function renderProcResultsHTML(crafts, procRate, craftCost, revenuePerUnit) {
            var totalCost = craftCost * crafts;
            var extraYield = crafts * (procRate / 100);
            var yieldWithProc = crafts + extraYield;
            var profitNoProc   = (crafts * revenuePerUnit) - totalCost;
            var profitWithProc = (yieldWithProc * revenuePerUnit) - totalCost;
            var procBonus = profitWithProc - profitNoProc;
            var marginNoProc   = totalCost > 0 ? (profitNoProc   / totalCost * 100).toFixed(1) + '%' : '—';
            var marginWithProc = totalCost > 0 ? (profitWithProc / totalCost * 100).toFixed(1) + '%' : '—';
            function pRow(lbl, val, hl) {
                return '<div class="proc-row' + (hl ? ' hl' : '') + '"><span class="proc-row-lbl">' + lbl + '</span><span class="proc-row-val">' + val + '</span></div>';
            }
            function pgold(v) { return '<span class="' + profitClass(v) + '">' + (v >= 0 ? '+' : '') + gold(v) + '</span>'; }
            return pRow('Input cost', gold(totalCost)) +
                '<hr class="proc-divider">' +
                '<div style="font-size:0.75em;color:#5a5a8c;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Without procs</div>' +
                pRow('Yield', crafts + ' items') +
                pRow('Profit', pgold(profitNoProc) + ' <span style="color:#555">(' + marginNoProc + ')</span>', true) +
                '<hr class="proc-divider">' +
                '<div style="font-size:0.75em;color:#5a3a8c;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">With procs on rate</div>' +
                pRow('Expected yield', yieldWithProc.toFixed(1) + ' items <span style="color:#a78bfa">(+' + extraYield.toFixed(1) + ')</span>') +
                pRow('Profit from bonus yield', pgold(procBonus)) +
                '<hr class="proc-divider">' +
                pRow('Profit', pgold(profitWithProc) + ' <span style="color:#555">(' + marginWithProc + ')</span>', true);
        }

        function procModalUpdate() {
            var overlay = document.getElementById('proc-overlay');
            if (!overlay || !overlay.classList.contains('open')) return;
            var resultsEl = document.getElementById('proc-results');
            if (!resultsEl) return;
            var crafts = parseInt((document.getElementById('proc-crafts') || {}).value) || 100;
            var r = alchResults.find(function(x) { return x.recipe.id === procModalRecipeId; });
            if (!r) {
                resultsEl.innerHTML = '<div style="color:#888;font-size:0.85em;padding:8px 0">Import prices first to see calculations.</div>';
                return;
            }
            var ahCutPct = getVal('alch_ah_cut') / 100;
            var revenuePerUnit = r.salePrice * (1 - ahCutPct);
            resultsEl.innerHTML = renderProcResultsHTML(crafts, alchProcRate, r.craftCost, revenuePerUnit);
        }

        function procIlStep(recipeId, delta) {
            var inp = document.getElementById('proc-il-crafts-' + recipeId);
            if (!inp) return;
            inp.value = Math.max(1, (parseInt(inp.value) || 100) + delta);
            procIlUpdate(recipeId);
        }

        function procIlReset(recipeId) {
            var inp = document.getElementById('proc-il-crafts-' + recipeId);
            if (inp) inp.value = 100;
            procIlUpdate(recipeId);
        }

        function procIlUpdate(recipeId) {
            var resultsEl = document.getElementById('proc-il-results-' + recipeId);
            if (!resultsEl) return;
            var rateLabel = document.getElementById('proc-il-rate-label-' + recipeId);
            if (rateLabel) rateLabel.textContent = 'at ' + alchProcRate + '% proc rate';
            var craftsInp = document.getElementById('proc-il-crafts-' + recipeId);
            var crafts = parseInt((craftsInp || {}).value) || 100;
            var r = alchResults.find(function(x) { return x.recipe.id === recipeId; });
            if (!r) {
                resultsEl.innerHTML = '<div style="color:#888;font-size:0.85em;padding:8px 0">Import prices first to see calculations.</div>';
                return;
            }
            var ahCutPct = getVal('alch_ah_cut') / 100;
            var revenuePerUnit = r.salePrice * (1 - ahCutPct);
            resultsEl.innerHTML = renderProcResultsHTML(crafts, alchProcRate, r.craftCost, revenuePerUnit);
        }

        // ===== EVERYTHING TAB =====

        function buildEvSections() {
            return [
                {
                    tabId: 'gear', tabLabel: 'Tailoring Gear',
                    cats: [{
                        catId: 'gear_bags',
                        catLabel: 'Tailoring Bags',
                        items: [
                            { id: 'bags_nw_bag', name: 'Netherweave Bag' },
                            { id: 'bags_imbued_bag', name: 'Imbued Netherweave Bag' }
                        ]
                    }].concat(GEAR_CATEGORY_ORDER.map(function(cat) {
                        return {
                            catId: 'gear_' + cat.includes[0],
                            catLabel: cat.label,
                            items: GEAR_RECIPES.filter(function(r) { return cat.includes.indexOf(r.category) !== -1; })
                                .map(function(r) { return { id: 'gear_' + r.id, name: r.name }; })
                        };
                    }).filter(function(cat) { return cat.items.length > 0; }))
                },
                {
                    tabId: 'alchemy', tabLabel: 'Alchemy',
                    cats: CATEGORY_ORDER.map(function(cat) {
                        return {
                            catId: 'alch_' + cat.includes[0],
                            catLabel: cat.label,
                            items: ALCHEMY_RECIPES.filter(function(r) { return cat.includes.indexOf(r.category) !== -1; })
                                .map(function(r) { return { id: 'alch_' + r.id, name: r.name }; })
                        };
                    }).filter(function(cat) { return cat.items.length > 0; })
                },
                {
                    tabId: 'tx', tabLabel: 'Transmutes / Dailies',
                    cats: [
                        { catId: 'tx_mote_primal', catLabel: 'Mote \u2192 Primal',
                          items: TX_PRIMALS.map(function(p) { return { id: 'tx_primal_' + p.id, name: p.primal }; }) },
                        { catId: 'tx_planar', catLabel: 'Planar Essence',
                          items: [{ id: 'tx_planar_essence', name: '3\u00d7 Lesser \u2192 Greater Planar' }] },
                        { catId: 'tx_transmutes', catLabel: 'Transmutes',
                          items: TRANSMUTE_RECIPES.map(function(r) { return { id: 'tx_' + r.id, name: r.name }; }) },
                        { catId: 'tx_cloth', catLabel: 'Cloth Dailies',
                          items: CLOTH_DAILIES.map(function(r) { return { id: 'tx_' + r.id, name: r.name }; }) }
                    ]
                },
                {
                    tabId: 'cooking', tabLabel: 'Cooking',
                    cats: COOKING_CATEGORY_ORDER.map(function(cat) {
                        return {
                            catId: 'cook_' + cat.includes[0],
                            catLabel: cat.label,
                            items: COOKING_RECIPES.filter(function(r) { return cat.includes.indexOf(r.category) !== -1; })
                                .map(function(r) { return { id: 'cook_' + r.id, name: r.name }; })
                        };
                    }).filter(function(cat) { return cat.items.length > 0; })
                },
                {
                    tabId: 'enchanting', tabLabel: 'Enchanting',
                    cats: ENCHANTING_CATEGORY_ORDER.map(function(cat) {
                        return {
                            catId: 'ench_' + cat.includes[0],
                            catLabel: cat.label,
                            items: ENCHANTING_RECIPES.filter(function(r) { return cat.includes.indexOf(r.category) !== -1; })
                                .map(function(r) { return { id: 'ench_' + r.id, name: r.name }; })
                        };
                    }).filter(function(cat) { return cat.items.length > 0; })
                },
                {
                    tabId: 'leatherworking', tabLabel: 'Leatherworking',
                    cats: LW_CATEGORY_ORDER.map(function(cat) {
                        return {
                            catId: 'lw_' + cat.includes[0],
                            catLabel: cat.label,
                            items: LW_RECIPES.filter(function(r) { return cat.includes.indexOf(r.category) !== -1; })
                                .map(function(r) { return { id: 'lw_' + r.id, name: r.name }; })
                        };
                    }).filter(function(cat) { return cat.items.length > 0; })
                }
            ];
        }

        function buildEvFilterHTML() {
            var html = '';
            evSections.forEach(function(section) {
                var tabHid = !!evHidden['tab_' + section.tabId];
                html += '<div class="ev-ftree-tab">';
                html += '<label><input type="checkbox"' + (!tabHid ? ' checked' : '') + ' onchange="evToggleTab(\'' + section.tabId + '\')"> ' + section.tabLabel + '</label>';
                html += '<div class="ev-ftree-cats">';
                section.cats.forEach(function(cat) {
                    var catHid = !!evHidden['cat_' + cat.catId];
                    var catChecked = !tabHid && !catHid;
                    html += '<div class="ev-ftree-cat">';
                    html += '<label><input type="checkbox"' + (catChecked ? ' checked' : '') + (tabHid ? ' disabled' : '') + ' onchange="evToggleCat(\'' + cat.catId + '\')"> ' + cat.catLabel + '</label>';
                    html += '<div class="ev-ftree-items">';
                    cat.items.forEach(function(item) {
                        var itemHid = !!evHidden['item_' + item.id];
                        var itemChecked = !tabHid && !catHid && !itemHid;
                        html += '<div class="ev-ftree-item"><label><input type="checkbox"' + (itemChecked ? ' checked' : '') + ((tabHid || catHid) ? ' disabled' : '') + ' onchange="evToggleItem(\'' + item.id + '\')"> ' + item.name + '</label></div>';
                    });
                    html += '</div></div>';
                });
                html += '</div></div>';
            });
            return html;
        }

        function evToggleTab(tabId) {
            evHidden['tab_' + tabId] = !evHidden['tab_' + tabId];
            evSaveHidden(); evRefreshFilter(); evCalculate();
        }
        function evToggleCat(catId) {
            evHidden['cat_' + catId] = !evHidden['cat_' + catId];
            evSaveHidden(); evRefreshFilter(); evCalculate();
        }
        function evToggleItem(itemId) {
            evHidden['item_' + itemId] = !evHidden['item_' + itemId];
            evSaveHidden(); evRefreshFilter(); evCalculate();
        }
        function evSaveHidden() { localStorage.setItem(EV_HIDDEN_KEY, JSON.stringify(evHidden)); }
        function evRefreshFilter() {
            var body = document.getElementById('ev-filter-body');
            if (body) body.innerHTML = buildEvFilterHTML();
        }
        function openEvFilter() {
            evRefreshFilter();
            var ov = document.getElementById('ev-filter-overlay');
            if (ov) ov.classList.add('open');
        }
        function closeEvFilter() {
            var ov = document.getElementById('ev-filter-overlay');
            if (ov) ov.classList.remove('open');
        }
        function evResetFilter() {
            evHidden = {};
            evSaveHidden(); evRefreshFilter(); evCalculate();
        }
        function setEvSort(by) {
            evSortBy = by;
            localStorage.setItem(EV_SORT_KEY, by);
            document.querySelectorAll('.ev-sort-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.sort === by); });
            evCalculate();
        }
        function setEvView(view) {
            evView = view;
            localStorage.setItem(EV_VIEW_KEY, view);
            document.querySelectorAll('.ev-view-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.view === view); });
            evCalculate();
        }
        function evGetTsm(tsmTab, tsmId, field) {
            var tsm = tsmTab === 'alch' ? alchTsm : tsmTab === 'gear' ? gearTsm : tsmTab === 'tx' ? txTsm : tsmTab === 'cook' ? cookTsm : tsmTab === 'ench' ? enchTsm : tsmTab === 'lw' ? lwTsm : null;
            if (!tsm || !tsmId || !tsm[tsmId]) return null;
            return tsm[tsmId][field] != null ? tsm[tsmId][field] : null;
        }
        function evRowHtml(row) {
            var cls = profitClass(row.profit);
            var pct = profitPctStr(row.profit, row.craftCost);
            var daily = evGetTsm(row.tsmTab, row.tsmId, 'daily');
            var avg = evGetTsm(row.tsmTab, row.tsmId, 'avgPrice');
            return '<tr>' +
                '<td>' + row.name + ' <span class="ev-tab-badge">' + row.tabLabel + '</span></td>' +
                '<td>' + gold(row.craftCost) + '</td>' +
                '<td>' + gold(row.revenue) + '</td>' +
                '<td class="' + cls + '">' + (row.profit >= 0 ? '+' : '') + gold(row.profit) + '</td>' +
                '<td class="' + cls + '">' + pct + '</td>' +
                '<td>' + (daily != null ? daily : '\u2014') + '</td>' +
                '<td>' + (avg != null ? gold(avg) : '\u2014') + '</td>' +
            '</tr>';
        }
        function evCategoryInfo(order, prefix, category) {
            var catInfo = order.find(function(c) { return c.includes.indexOf(category) !== -1; });
            return {
                catId: prefix + (catInfo ? catInfo.includes[0] : category),
                catLabel: catInfo ? catInfo.label : category
            };
        }
        function evPushRecipeRows(rows, results, cfg) {
            results.forEach(function(r) {
                if (cfg.skip && cfg.skip(r)) return;
                var cat = evCategoryInfo(cfg.categoryOrder, cfg.prefix, r.recipe.category);
                rows.push({
                    id: cfg.idPrefix + r.recipe.id,
                    name: r.recipe.name,
                    tab: cfg.tab,
                    tabLabel: cfg.tabLabel,
                    catId: cat.catId,
                    catLabel: cat.catLabel,
                    craftCost: r.craftCost,
                    revenue: r.salePrice * (1 - cfg.ahCut),
                    profit: r.profit,
                    tsmTab: cfg.tsmTab,
                    tsmId: r.recipe.id
                });
            });
        }
        function evCalculate() {
            var body = document.getElementById('ev-body');
            if (!body) return;
            var rows = [];
            var hidden = getHiddenRecipes();

            var gearAhCut = getVal('gear_ah_cut') / 100;
            evPushRecipeRows(rows, gearResults, {
                categoryOrder: GEAR_CATEGORY_ORDER,
                prefix: 'gear_',
                idPrefix: 'gear_',
                tab: 'gear',
                tabLabel: 'Tailoring Gear',
                ahCut: gearAhCut,
                tsmTab: 'gear'
            });

            var alchAhCut = getVal('alch_ah_cut') / 100;
            evPushRecipeRows(rows, alchResults, {
                categoryOrder: CATEGORY_ORDER,
                prefix: 'alch_',
                idPrefix: 'alch_',
                tab: 'alchemy',
                tabLabel: 'Alchemy',
                ahCut: alchAhCut,
                tsmTab: 'alch',
                skip: function(r) { return hidden[r.recipe.id]; }
            });

            txSummaryRows.forEach(function(row) {
                var catId, catLabel, itemId;
                if (row.primalId) {
                    catId = 'tx_mote_primal'; catLabel = 'Mote \u2192 Primal'; itemId = 'tx_primal_' + row.primalId;
                } else if (row.recipeId === 'planar_essence') {
                    catId = 'tx_planar'; catLabel = 'Planar Essence'; itemId = 'tx_planar_essence';
                } else if (TRANSMUTE_RECIPES.some(function(r) { return r.id === row.recipeId; })) {
                    catId = 'tx_transmutes'; catLabel = 'Transmutes'; itemId = 'tx_' + row.recipeId;
                } else {
                    catId = 'tx_cloth'; catLabel = 'Cloth Dailies'; itemId = 'tx_' + row.recipeId;
                }
                rows.push({ id: itemId, name: row.label, tab: 'tx', tabLabel: 'Transmutes / Dailies', catId: catId, catLabel: catLabel, craftCost: row.cost, revenue: row.revenue, profit: row.profit, tsmTab: 'tx', tsmId: row.recipeId });
            });

            var cookAhEl = document.getElementById('cook_ah_cut');
            var cookAhCut = cookAhEl ? parseFloat(cookAhEl.value) / 100 : 0.05;
            evPushRecipeRows(rows, cookResults, {
                categoryOrder: COOKING_CATEGORY_ORDER,
                prefix: 'cook_',
                idPrefix: 'cook_',
                tab: 'cooking',
                tabLabel: 'Cooking',
                ahCut: cookAhCut,
                tsmTab: 'cook'
            });

            var enchAhEl = document.getElementById('ench_ah_cut');
            var enchAhCut = enchAhEl ? parseFloat(enchAhEl.value) / 100 : 0.05;
            evPushRecipeRows(rows, enchResults, {
                categoryOrder: ENCHANTING_CATEGORY_ORDER,
                prefix: 'ench_',
                idPrefix: 'ench_',
                tab: 'enchanting',
                tabLabel: 'Enchanting',
                ahCut: enchAhCut,
                tsmTab: 'ench'
            });

            var lwAhEl = document.getElementById('lw_ah_cut');
            var lwAhCut = lwAhEl ? parseFloat(lwAhEl.value) / 100 : 0.05;
            evPushRecipeRows(rows, lwResults, {
                categoryOrder: LW_CATEGORY_ORDER,
                prefix: 'lw_',
                idPrefix: 'lw_',
                tab: 'leatherworking',
                tabLabel: 'Leatherworking',
                ahCut: lwAhCut,
                tsmTab: 'lw'
            });

            rows = rows.filter(function(row) {
                return !evHidden['tab_' + row.tab] && !evHidden['cat_' + row.catId] && !evHidden['item_' + row.id];
            });

            if (evView === 'sections') {
                var tabOrder = ['gear', 'alchemy', 'tx', 'cooking', 'enchanting', 'leatherworking'];
                var html = '';
                tabOrder.forEach(function(tabId) {
                    var tabRows = rows.filter(function(r) { return r.tab === tabId; });
                    if (!tabRows.length) return;
                    sortResults(tabRows, evSortBy);
                    html += '<tr class="ev-section-hdr"><td colspan="7">' + tabRows[0].tabLabel + '</td></tr>';
                    tabRows.forEach(function(row) { html += evRowHtml(row); });
                });
                body.innerHTML = html;
            } else {
                sortResults(rows, evSortBy);
                var html = '';
                rows.forEach(function(row) { html += evRowHtml(row); });
                body.innerHTML = html;
            }
        }

        function evInit() {
            evSections = buildEvSections();
            var tab = document.getElementById('tab-everything');
            if (!tab) return;
            tab.insertAdjacentHTML('beforeend',
                '<div class="ev-filter-overlay" id="ev-filter-overlay">' +
                    '<div class="ev-filter-modal">' +
                        '<div class="ev-filter-hdr">' +
                            '<span class="ev-filter-title">Filter Recipes</span>' +
                            '<button class="ev-filter-close-btn" onclick="closeEvFilter()">\u00d7</button>' +
                        '</div>' +
                        '<div class="ev-filter-body" id="ev-filter-body"></div>' +
                        '<div class="ev-filter-footer">' +
                            '<button class="ev-filter-reset-btn" onclick="evResetFilter()">Show All</button>' +
                        '</div>' +
                    '</div>' +
                '</div>'
            );
            document.getElementById('ev-filter-overlay').addEventListener('click', function(e) {
                if (e.target.id === 'ev-filter-overlay') closeEvFilter();
            });
        }

        // ===== INGREDIENT SEARCH =====

        var ingSearchIndex = null;

        function buildIngSearchIndex() {
            var index = {};
            function add(itemName, entry) {
                var key = itemName.toLowerCase();
                if (!index[key]) index[key] = { displayName: itemName, recipes: [] };
                var dup = index[key].recipes.some(function(r) { return r.recipeId === entry.recipeId && r.tab === entry.tab; });
                if (!dup) index[key].recipes.push(entry);
            }

            // Alchemy
            ALCHEMY_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    add(ing.item, { recipeId: r.id, recipeName: r.name, tab: 'alchemy', tabLabel: 'Alchemy', qty: ing.qty });
                    if (ing.craftFrom && ing.craftFrom.item) {
                        add(ing.craftFrom.item, { recipeId: r.id, recipeName: r.name, tab: 'alchemy', tabLabel: 'Alchemy', qty: ing.craftFrom.qty * ing.qty, viaItem: ing.item });
                    }
                });
            });

            // Gear
            getAllGearRecipes().forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    if (ing.type === 'bop') return;
                    add(ing.item, { recipeId: r.id, recipeName: r.name, tab: 'gear', tabLabel: 'Tailoring Gear', qty: ing.qty });
                    if (ing.craftFrom) {
                        if (ing.craftFrom.item) {
                            add(ing.craftFrom.item, { recipeId: r.id, recipeName: r.name, tab: 'gear', tabLabel: 'Tailoring Gear', qty: ing.craftFrom.qty * ing.qty, viaItem: ing.item });
                        }
                        if (ing.craftFrom.mats) {
                            ing.craftFrom.mats.forEach(function(mat) {
                                if (mat.type === 'vendor') return;
                                add(mat.item, { recipeId: r.id, recipeName: r.name, tab: 'gear', tabLabel: 'Tailoring Gear', qty: mat.qty * ing.qty, viaItem: ing.item });
                            });
                        }
                    }
                });
            });

            // Cooking
            COOKING_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    add(ing.item, { recipeId: r.id, recipeName: r.name, tab: 'cooking', tabLabel: 'Cooking', qty: ing.qty });
                });
            });

            // Transmute recipes
            TRANSMUTE_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    if (ing.type === 'primal') {
                        var p = TX_PRIMALS.find(function(x) { return x.id === ing.primalId; });
                        if (p) {
                            add(p.primal, { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty });
                            add(p.mote, { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty * 10, viaItem: p.primal });
                        }
                    } else if (ing.type === 'gem') {
                        add(ing.item, { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty });
                    }
                });
            });

            // Cloth dailies
            CLOTH_DAILIES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    if (ing.type === 'imbued_bolt') {
                        add('Bolt of Imbued Netherweave', { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty });
                        add('Bolt of Netherweave', { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty * 3, viaItem: 'Bolt of Imbued Netherweave' });
                        add('Netherweave Cloth', { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty * 18, viaItem: 'Bolt of Imbued Netherweave' });
                        add('Arcane Dust', { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty * 2, viaItem: 'Bolt of Imbued Netherweave' });
                    } else if (ing.type === 'primal') {
                        var p = TX_PRIMALS.find(function(x) { return x.id === ing.primalId; });
                        if (p) {
                            add(p.primal, { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty });
                            add(p.mote, { recipeId: r.id, recipeName: r.name, tab: 'tx', tabLabel: 'Transmutes / Dailies', qty: ing.qty * 10, viaItem: p.primal });
                        }
                    }
                });
            });

            // Enchanting
            ENCHANTING_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    add(ing.item, { recipeId: r.id, recipeName: r.name, tab: 'enchanting', tabLabel: 'Enchanting', qty: ing.qty });
                });
            });

            // Leatherworking
            LW_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    if (ing.type === 'bop') return;
                    add(ing.item, { recipeId: r.id, recipeName: r.name, tab: 'leatherworking', tabLabel: 'Leatherworking', qty: ing.qty });
                    if (ing.craftFrom && ing.craftFrom.item) {
                        add(ing.craftFrom.item, { recipeId: r.id, recipeName: r.name, tab: 'leatherworking', tabLabel: 'Leatherworking', qty: ing.craftFrom.qty * ing.qty, viaItem: ing.item });
                    }
                });
            });

            return index;
        }

        function ingGetProfit(tab, recipeId) {
            if (tab === 'alchemy') {
                var r = alchResults.find(function(x) { return x.recipe.id === recipeId; });
                return r ? r.profit : null;
            } else if (tab === 'gear') {
                var r = gearResults.find(function(x) { return x.recipe.id === recipeId; });
                return r ? r.profit : null;
            } else if (tab === 'cooking') {
                var r = cookResults.find(function(x) { return x.recipe.id === recipeId; });
                return r ? r.profit : null;
            } else if (tab === 'tx') {
                var r = txSummaryRows.find(function(x) { return x.recipeId === recipeId; });
                return r ? r.profit : null;
            } else if (tab === 'enchanting') {
                var r = enchResults.find(function(x) { return x.recipe.id === recipeId; });
                return r ? r.profit : null;
            } else if (tab === 'leatherworking') {
                var r = lwResults.find(function(x) { return x.recipe.id === recipeId; });
                return r ? r.profit : null;
            }
            return null;
        }

        function ingGetIngredients(tab, recipeId) {
            if (tab === 'alchemy') {
                var r = ALCHEMY_RECIPES.find(function(x) { return x.id === recipeId; });
                if (!r) return [];
                return r.ingredients.map(function(ing) {
                    return ing.qty + '\u00d7 ' + ing.item + (ing.type === 'vendor' ? ' (vendor)' : ing.type === 'bop' ? ' (BOP)' : '');
                });
            } else if (tab === 'gear') {
                var r = getAllGearRecipes().find(function(x) { return x.id === recipeId; });
                if (!r) return [];
                return r.ingredients.map(function(ing) {
                    return ing.qty + '\u00d7 ' + ing.item + (ing.type === 'vendor' ? ' (vendor)' : ing.type === 'bop' ? ' (BOP)' : '');
                });
            } else if (tab === 'cooking') {
                var r = COOKING_RECIPES.find(function(x) { return x.id === recipeId; });
                if (!r) return [];
                return r.ingredients.map(function(ing) {
                    return ing.qty + '\u00d7 ' + ing.item + (ing.type === 'vendor' ? ' (vendor)' : '');
                });
            } else if (tab === 'tx') {
                var r = TRANSMUTE_RECIPES.find(function(x) { return x.id === recipeId; });
                if (!r) r = CLOTH_DAILIES.find(function(x) { return x.id === recipeId; });
                if (!r) return [];
                return r.ingredients.map(function(ing) {
                    if (ing.type === 'primal') {
                        var p = TX_PRIMALS.find(function(x) { return x.id === ing.primalId; });
                        return ing.qty + '\u00d7 ' + (p ? p.primal : ing.item);
                    } else if (ing.type === 'imbued_bolt') {
                        return ing.qty + '\u00d7 Bolt of Imbued Netherweave';
                    }
                    return ing.qty + '\u00d7 ' + ing.item;
                });
            } else if (tab === 'enchanting') {
                var r = ENCHANTING_RECIPES.find(function(x) { return x.id === recipeId; });
                if (!r) return [];
                return r.ingredients.map(function(ing) {
                    return ing.qty + '\u00d7 ' + ing.item + (ing.type === 'vendor' ? ' (vendor)' : '');
                });
            } else if (tab === 'leatherworking') {
                var r = LW_RECIPES.find(function(x) { return x.id === recipeId; });
                if (!r) return [];
                return r.ingredients.map(function(ing) {
                    return ing.qty + '\u00d7 ' + ing.item + (ing.craftFrom ? ' (or ' + (ing.qty * ing.craftFrom.qty) + '\u00d7 ' + ing.craftFrom.item + ')' : '');
                });
            }
            return [];
        }

        function ingGotoRecipe(tab, recipeId) {
            closeIngSearch();
            switchTab(tab);
            if (tab === 'alchemy') alchSelectRecipe(recipeId);
            else if (tab === 'gear') gearSelectRecipe(recipeId);
            else if (tab === 'tx') txSelectRecipe(recipeId);
            else if (tab === 'cooking') cookSelectRecipe(recipeId);
            else if (tab === 'enchanting') enchSelectRecipe(recipeId);
            else if (tab === 'leatherworking') lwSelectRecipe(recipeId);
        }

        function openIngSearch() {
            if (!ingSearchIndex) ingSearchIndex = buildIngSearchIndex();
            var ov = document.getElementById('is-overlay');
            if (ov) ov.classList.add('open');
            var inp = document.getElementById('is-input');
            if (inp) { inp.value = ''; inp.focus(); }
            document.getElementById('is-results').innerHTML = '<div class="is-empty">Type an ingredient name to find which recipes use it.</div>';
        }

        function closeIngSearch() {
            var ov = document.getElementById('is-overlay');
            if (ov) ov.classList.remove('open');
        }

        function runIngSearch() {
            var query = (document.getElementById('is-input').value || '').trim().toLowerCase();
            var resultsEl = document.getElementById('is-results');
            if (!query) {
                resultsEl.innerHTML = '<div class="is-empty">Type an ingredient name to find which recipes use it.</div>';
                return;
            }
            var matches = [];
            for (var key in ingSearchIndex) {
                if (key.indexOf(query) !== -1) matches.push(ingSearchIndex[key]);
            }
            matches.sort(function(a, b) {
                var ai = a.displayName.toLowerCase().indexOf(query);
                var bi = b.displayName.toLowerCase().indexOf(query);
                if (ai !== bi) return ai - bi;
                return a.displayName.localeCompare(b.displayName);
            });
            if (!matches.length) {
                resultsEl.innerHTML = '<div class="is-empty">No ingredients found matching \u201c' + query + '\u201d.</div>';
                return;
            }
            var html = '';
            matches.forEach(function(item) {
                html += '<div class="is-item-group">';
                html += '<div style="padding:6px 18px 3px;font-size:0.78em;color:#a78bfa;font-weight:bold;letter-spacing:0.3px;text-transform:uppercase;">' + item.displayName + '</div>';
                item.recipes.forEach(function(rec) {
                    var profit = ingGetProfit(rec.tab, rec.recipeId);
                    var profitHtml = profit !== null
                        ? '<span class="is-profit ' + profitClass(profit) + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</span>'
                        : '<span class="is-profit" style="color:#555">—</span>';
                    var viaHtml = rec.viaItem ? ' <span style="color:#555;font-size:0.78em">via ' + rec.viaItem + '</span>' : '';
                    var ings = ingGetIngredients(rec.tab, rec.recipeId);
                    var ingListHtml = ings.map(function(i) { return '<span>' + i + '</span>'; }).join(' &nbsp;·&nbsp; ');
                    var craftCostVal = null;
                    if (rec.tab === 'alchemy') { var rx = alchResults.find(function(x){return x.recipe.id===rec.recipeId;}); if(rx) craftCostVal = rx.craftCost; }
                    else if (rec.tab === 'gear') { var rx = gearResults.find(function(x){return x.recipe.id===rec.recipeId;}); if(rx) craftCostVal = rx.craftCost; }
                    else if (rec.tab === 'cooking') { var rx = cookResults.find(function(x){return x.recipe.id===rec.recipeId;}); if(rx) craftCostVal = rx.craftCost; }
                    else if (rec.tab === 'tx') { var rx = txSummaryRows.find(function(x){return x.recipeId===rec.recipeId;}); if(rx) craftCostVal = rx.cost; }
                    var statsHtml = craftCostVal !== null
                        ? '<div class="is-detail-stats"><span>Cost: <b>' + gold(craftCostVal) + '</b></span><span>Profit: <b>' + (profit !== null ? (profit>=0?'+':'') + gold(profit) : '\u2014') + '</b></span></div>'
                        : '';
                    var gotoTab = rec.tab === 'gear' ? 'gear' : rec.tab;
                    var gotoId = rec.recipeId;
                    var gotoBtnHtml = gotoId
                        ? '<button class="is-goto-btn" onclick="ingGotoRecipe(\'' + gotoTab + '\',\'' + gotoId + '\');event.stopPropagation();">\u2192 Go to recipe</button>'
                        : '<button class="is-goto-btn" onclick="ingGotoRecipe(\'' + gotoTab + '\',\'\');event.stopPropagation();">\u2192 Go to tab</button>';
                    html += '<div class="is-recipe-row" onclick="this.classList.toggle(\'open\')">' +
                        '<div class="is-recipe-hdr">' +
                            '<span class="is-recipe-name">' + rec.recipeName + viaHtml + '</span>' +
                            '<span class="ev-tab-badge">' + rec.tabLabel + '</span>' +
                            '<span class="is-qty">\u00d7' + rec.qty + '</span>' +
                            profitHtml +
                            '<span class="is-arrow">\u25b6</span>' +
                        '</div>' +
                        '<div class="is-recipe-detail">' +
                            '<div class="is-detail-ings">' + ingListHtml + '</div>' +
                            statsHtml +
                            gotoBtnHtml +
                        '</div>' +
                    '</div>';
                });
                html += '</div>';
            });
            resultsEl.innerHTML = html;
        }

        function buildAhInputMap() {
            var nonAhPattern = /^(alch_vendor_|alch_deposit_|gear_vendor_|gear_deposit_|cook_vendor_|cook_deposit_|tx_deposit_|ench_vendor_|ench_deposit_|lw_vendor_|lw_deposit_)/;
            var allMaps = [alchNameToInput, gearNameToInput, txNameToInput, cookNameToInput, enchNameToInput, lwNameToInput];
            allMaps.forEach(function(map) {
                for (var name in map) {
                    var id = map[name];
                    if (!id || nonAhPattern.test(id) || id.indexOf('_ah_cut') !== -1) continue;
                    AH_INPUT_TO_NAME[id] = name;
                }
            });
        }

        function injectStalenessDotsToRows() {
            document.querySelectorAll('.price-table-row').forEach(function(row) {
                if (row.querySelector('.staleness-dot')) return;
                var input = row.querySelector('.price-control input[type="number"]');
                if (!input) return;
                var inputId = input.id;
                var itemName = AH_INPUT_TO_NAME[inputId];
                if (!itemName || STALENESS_EXEMPT_ITEMS.has(itemName)) return;
                var ptName = row.querySelector('.pt-name');
                if (!ptName) return;
                var dot = document.createElement('span');
                dot.className = 'staleness-dot';
                dot.setAttribute('data-staleness-input', inputId);
                row.insertBefore(dot, ptName);
            });
            updateStalenessDotsOnRows();
        }

        function updateStalenessDotsOnRows() {
            document.querySelectorAll('[data-staleness-input]').forEach(function(dot) {
                dot.style.background = getStalenessColor(dot.getAttribute('data-staleness-input'));
            });
        }

        function getAlchRecipeStalenessInputs(r) {
            var ids = [];
            var productId = 'alch_sale_' + r.id;
            if (AH_INPUT_TO_NAME[productId]) ids.push(productId);
            r.ingredients.forEach(function(ing) {
                if (STALENESS_EXEMPT_ITEMS.has(ing.item)) return;
                var id = alchNameToInput[ing.item];
                if (id && AH_INPUT_TO_NAME[id]) ids.push(id);
                if (ing.craftFrom && ing.craftFrom.item && !STALENESS_EXEMPT_ITEMS.has(ing.craftFrom.item)) {
                    var cfId = alchNameToInput[ing.craftFrom.item];
                    if (cfId && AH_INPUT_TO_NAME[cfId]) ids.push(cfId);
                }
            });
            return ids;
        }

        function getGearRecipeStalenessInputs(r) {
            var ids = [];
            var productId = 'gear_sale_' + r.id;
            if (AH_INPUT_TO_NAME[productId]) ids.push(productId);
            r.ingredients.forEach(function(ing) {
                if (ing.type === 'bop' || ing.type === 'vendor') return;
                if (STALENESS_EXEMPT_ITEMS.has(ing.item)) return;
                var id = gearNameToInput[ing.item];
                if (id && AH_INPUT_TO_NAME[id]) ids.push(id);
                if (ing.craftFrom) {
                    if (ing.craftFrom.item && !STALENESS_EXEMPT_ITEMS.has(ing.craftFrom.item)) {
                        var cfId = gearNameToInput[ing.craftFrom.item];
                        if (cfId && AH_INPUT_TO_NAME[cfId]) ids.push(cfId);
                    }
                    if (ing.craftFrom.mats) {
                        ing.craftFrom.mats.forEach(function(mat) {

        function getTxStalenessInputs(recipeId, primalId) {
            var ids = [];
            if (recipeId === 'mote_primals') {
                if (primalId) {
                    ids.push('tx_mote_' + primalId);
                    ids.push('tx_primal_' + primalId);
                } else {
                    TX_PRIMALS.forEach(function(p) { ids.push('tx_mote_' + p.id); ids.push('tx_primal_' + p.id); });
                }
            } else if (recipeId === 'planar_essence') {
                ids.push('tx_lesser_planar');
                ids.push('tx_greater_planar');
            } else {
                var saleId = 'tx_sale_' + recipeId;
                if (AH_INPUT_TO_NAME[saleId]) ids.push(saleId);
                var recipe = null;
                for (var i = 0; i < TRANSMUTE_RECIPES.length; i++) { if (TRANSMUTE_RECIPES[i].id === recipeId) { recipe = TRANSMUTE_RECIPES[i]; break; } }
                if (!recipe) { for (var i = 0; i < CLOTH_DAILIES.length; i++) { if (CLOTH_DAILIES[i].id === recipeId) { recipe = CLOTH_DAILIES[i]; break; } } }
                if (recipe) {
                    recipe.ingredients.forEach(function(ing) {
                        if (STALENESS_EXEMPT_ITEMS.has(ing.item)) return;
                        if (ing.type === 'primal') {
                            var p = null;
                            for (var j = 0; j < TX_PRIMALS.length; j++) { if (TX_PRIMALS[j].id === ing.primalId) { p = TX_PRIMALS[j]; break; } }
                            if (p) { ids.push('tx_mote_' + p.id); ids.push('tx_primal_' + p.id); }
                        } else if (ing.type === 'gem') {
                            var gId = 'tx_gem_' + sanitizeId(ing.item);
                            if (AH_INPUT_TO_NAME[gId]) ids.push(gId);
                        } else if (ing.type === 'imbued_bolt') {
                            ids.push('tx_imbued_bolt'); ids.push('tx_bolt_nw'); ids.push('tx_dust');
                        } else if (ing.type === 'ah') {
                            var id = txNameToInput[ing.item];
                            if (id && AH_INPUT_TO_NAME[id]) ids.push(id);
                        }
                    });
                }
            }

        function syncSharedPrice(changedId) {
            PRICE_STORE.syncChanged(changedId, function(id) {
                return document.getElementById(id);
            }, function(id, inputEl) {
                updateGSCDisplay(id);
                autoSizeInput(inputEl);
            });
        }

        function syncAllSharedPrices() {
            PRICE_STORE.syncAll(function(id) {
                return document.getElementById(id);
            }, function(group, getInputById) {
                var source = null;
                group.forEach(function(id) {
                    var el = getInputById(id);
                    if (el && parseFloat(el.value) && source === null) {
                        source = { id: id, value: el.value };
                    }
                });
                return source;
            }, function(id, inputEl) {
                updateGSCDisplay(id);
                autoSizeInput(inputEl);
            });
        }

        // ===== LOCK FUNCTIONS =====
        function getLocks(key) {
            try {
                return JSON.parse(localStorage.getItem(key)) || {};
            } catch (e) {
                return {};
            }
        }

        function saveLocks(locks, key) {
            localStorage.setItem(key, JSON.stringify(locks));
        }

        function toggleLock(inputId) {
            var btn = document.querySelector('.lock-btn[data-input="' + inputId + '"]');
            if (!btn) return;
            var locksKey = btn.dataset.locksKey || ALCH_LOCKS_KEY;
            var locks = getLocks(locksKey);
            locks[inputId] = !locks[inputId];
            saveLocks(locks, locksKey);
            updateLockDisplay(inputId);
        }

        function updateLockDisplay(inputId) {
            var btn = document.querySelector('.lock-btn[data-input="' + inputId + '"]');
            if (!btn) return;
            var locksKey = btn.dataset.locksKey || ALCH_LOCKS_KEY;
            var locks = getLocks(locksKey);
            var locked = !!locks[inputId];
            btn.classList.toggle('locked', locked);
            btn.innerHTML = locked ? '&#x1f512;' : '&#x1f513;';
            btn.title = locked ? 'Price locked (click to unlock)' : 'Click to lock price from import';
        }

        function updateAllLockDisplays() {
            document.querySelectorAll('.lock-btn').forEach(function(btn) {
                updateLockDisplay(btn.dataset.input);
            });
        }

        // ===== GLOBAL IMPORT =====
        function globalImportPrices() {
            var textarea = document.getElementById('global_import_input');
            var status   = document.getElementById('global_import_status');
            var text     = textarea.value.trim();
            if (!text) { status.textContent = 'Paste data first'; status.style.color = '#f87171'; return; }
            var batchTime = Date.now();

            function getLocksKey(id) {
                if (id.startsWith('alch_')) return ALCH_LOCKS_KEY;
                if (id.startsWith('gear_')) return GEAR_LOCKS_KEY;
                if (id.startsWith('tx_'))   return TX_LOCKS_KEY;
                if (id.startsWith('cook_')) return COOK_LOCKS_KEY;
                if (id.startsWith('ench_')) return ENCH_LOCKS_KEY;
                if (id.startsWith('lw_'))   return LW_LOCKS_KEY;
                return ALCH_LOCKS_KEY;
            }

            var lines   = text.split('\n');
            var updated = 0, skipped = 0;

            for (var i = 0; i < lines.length; i++) {
                var match = lines[i].match(/^"?(\d+)"?,\s*"([^"]+)"/);
                if (!match) continue;
                var copperPrice = parseInt(match[1]);
                var name        = match[2];
                var clean       = name.replace(/\s*\(\d+\)$/, '');
                var allIds = ALL_NAME_TO_INPUTS[name] || ALL_NAME_TO_INPUTS[clean] || [];
                if (allIds.length === 0) continue;
                var goldPrice = Math.round(copperPrice) / 10000;
                var anyUpdated = false, anySkipped = false;
                allIds.forEach(function(inputId) {
                    var locks = getLocks(getLocksKey(inputId));
                    if (locks[inputId]) { anySkipped = true; return; }
                    var iName = PRICE_STORE.getItemName(inputId) || AH_INPUT_TO_NAME[inputId] || name;
                    priceTimestamps[iName] = batchTime;
                    var input = document.getElementById(inputId);
                    if (input) { input.value = goldPrice; updateGSCDisplay(inputId); autoSizeInput(input); anyUpdated = true; }
                });
                if (anyUpdated) updated++;
                else if (anySkipped) skipped++;
            }

            lastImportBatchTime = batchTime;
            localStorage.setItem(PRICE_TIMESTAMPS_KEY, JSON.stringify(priceTimestamps));
            localStorage.setItem(LAST_IMPORT_BATCH_KEY, String(batchTime));
            syncAllSharedPrices();
            calculateAllTabs();
            updateStalenessDotsOnRows();

            var msg = 'Updated ' + updated + ' price' + (updated !== 1 ? 's' : '');
            if (skipped > 0) msg += ', ' + skipped + ' locked';
            status.textContent = msg;
            status.style.color = updated > 0 ? '#4ade80' : '#f87171';
        }
