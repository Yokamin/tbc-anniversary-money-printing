        // ===== COOLDOWN TRACKER =====
        var CD_KEY = 'tbc_cooldowns';
        var CD_DURATIONS = {
            cloth:     (3 * 24 * 60 + 20) * 60 * 1000,  // 3d 20h
            transmute: 20 * 60 * 60 * 1000               // 20h
        };

        function cdLoad() {
            try { return JSON.parse(localStorage.getItem(CD_KEY)) || {}; } catch(e) { return {}; }
        }

        function cdSave(data) { localStorage.setItem(CD_KEY, JSON.stringify(data)); }

        function cdUpdate(type) {
            var days  = parseInt((document.getElementById('cd_' + type + '_days')  || {value:0}).value) || 0;
            var hours = parseInt((document.getElementById('cd_' + type + '_hours') || {value:0}).value) || 0;
            var mins  = parseInt((document.getElementById('cd_' + type + '_mins')  || {value:0}).value) || 0;
            var ms    = ((days * 24 + hours) * 60 + mins) * 60 * 1000;
            var data  = cdLoad();
            data[type + 'Expiry']    = Date.now() + ms;
            delete data[type + 'Dismissed'];
            cdSave(data);
            cdRefresh();
        }

        function cdJustCrafted(type) {
            var data = cdLoad();
            data[type + 'Expiry']    = Date.now() + CD_DURATIONS[type];
            delete data[type + 'Dismissed'];
            cdSave(data);
            cdRefresh();
        }

        function cdRefresh() {
            var data     = cdLoad();
            var now      = Date.now();
            var readyNames = [];

            ['cloth', 'transmute'].forEach(function(type) {
                var expiry = data[type + 'Expiry'];
                var el     = document.getElementById('cd-' + type + '-time');
                if (!el) return;

                if (!expiry) { el.textContent = '--'; el.className = 'cd-time'; return; }

                var remaining = expiry - now;
                if (remaining <= 0) {
                    el.textContent = 'Ready!';
                    el.className   = 'cd-time cd-ready';
                    if (data[type + 'Dismissed'] !== expiry) readyNames.push(type);
                } else {
                    var d = Math.floor(remaining / 86400000);
                    var h = Math.floor((remaining % 86400000) / 3600000);
                    var m = Math.floor((remaining % 3600000)  / 60000);
                    var s = Math.floor((remaining % 60000)    / 1000);
                    el.textContent = (d > 0 ? d + 'd ' : '') + h + 'h ' + m + 'm ' + s + 's';
                    el.className   = 'cd-time';
                }
            });

            if (readyNames.length > 0) {
                var overlay = document.getElementById('cd-popup-overlay');
                if (overlay && !overlay.classList.contains('cd-open')) {
                    var clothEl = document.getElementById('cd-cloth-time');
                    var txEl    = document.getElementById('cd-transmute-time');
                    var msg     = document.getElementById('cd-popup-msg');
                    if (msg) {
                        msg.innerHTML =
                            '<div style="font-size:1.3em;color:#4ade80;margin-bottom:12px">&#9711; Cooldown Ready!</div>' +
                            '<div>Cloth Dailies: <strong>' + (clothEl ? clothEl.textContent : '--') + '</strong></div>' +
                            '<div>Transmute: <strong>' + (txEl ? txEl.textContent : '--') + '</strong></div>';
                    }
                    overlay.classList.add('cd-open');
                }
            }
        }

        function cdDismissPopup() {
            var data = cdLoad();
            var now  = Date.now();
            ['cloth', 'transmute'].forEach(function(type) {
                if (data[type + 'Expiry'] && data[type + 'Expiry'] <= now) {
                    data[type + 'Dismissed'] = data[type + 'Expiry'];
                }
            });
            cdSave(data);
            var overlay = document.getElementById('cd-popup-overlay');
            if (overlay) overlay.classList.remove('cd-open');
        }

        function cdInit() {
            cdRefresh();
            setInterval(cdRefresh, 1000);
        }

            var ahItemsSet = {};
            var vendorItemsSet = {};

            ALCHEMY_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    if (ing.type === 'ah') ahItemsSet[ing.item] = true;
                    else if (ing.type === 'vendor') vendorItemsSet[ing.item] = true;
                    if (!itemToRecipes[ing.item]) itemToRecipes[ing.item] = [];
                    itemToRecipes[ing.item].push(r.id);
                    if (ing.craftFrom) {
                        ahItemsSet[ing.craftFrom.item] = true;
                        if (!itemToRecipes[ing.craftFrom.item]) itemToRecipes[ing.craftFrom.item] = [];
                        itemToRecipes[ing.craftFrom.item].push(r.id);
                    }
                });
            });
            var transmuteItemsSet = {};
            ALCHEMY_RECIPES.forEach(function(r) {
                r.ingredients.forEach(function(ing) {
                    if (ing.craftFrom) {
                        transmuteItemsSet[ing.item] = true;
                        transmuteItemsSet[ing.craftFrom.item] = true;
                    }
                });
            });

            var allAhItems = Object.keys(ahItemsSet).sort();
            var regularAhItems = allAhItems.filter(function(i) { return !transmuteItemsSet[i]; });
            var transmuteAhItems = allAhItems.filter(function(i) { return transmuteItemsSet[i]; });

        // ===== ALCHEMY: IMPORT =====
        function alchImportPrices() {
            var textarea = document.getElementById('alch_ah_import');
            var status = document.getElementById('alch_import_status');
            var text = textarea.value.trim();
            if (!text) {
                status.textContent = 'Paste AH data first';
                status.style.color = '#f87171';
                return;
            }

            var locks = getLocks(ALCH_LOCKS_KEY);
            var lines = text.split('\n');
            var updated = 0;
            var skipped = 0;
            var skippedNames = [];

            for (var i = 0; i < lines.length; i++) {
                var match = lines[i].match(/^"?(\d+)"?,\s*"([^"]+)"/);
                if (!match) continue;

                var copperPrice = parseInt(match[1]);
                var name = match[2];
                var inputId = alchNameToInput[name];

                if (!inputId) continue;

                if (locks[inputId]) {
                    skipped++;
                    skippedNames.push(name);
                    continue;
                }

                var goldPrice = Math.round(copperPrice) / 10000;
                var input = document.getElementById(inputId);
                if (input) {
                    input.value = goldPrice;
                    updateGSCDisplay(inputId);
                    autoSizeInput(input);
                    updated++;
                }
            }

            syncAllSharedPrices();
            calculateCoreTabs();

            var msg = 'Updated ' + updated + ' price' + (updated !== 1 ? 's' : '');
            if (skipped > 0) {
                msg += ', ' + skipped + ' locked (' + skippedNames.join(', ') + ')';
            }
            status.textContent = msg;
            status.style.color = '#4ade80';
        }

        // ===== ALCHEMY: SAVE / LOAD =====
        function alchSaveToStorage() {
            var data = {};
            document.querySelectorAll('#tab-alchemy input').forEach(function(input) {
                if (input.id) data[input.id] = input.value;
            });
            localStorage.setItem(ALCH_STORAGE_KEY, JSON.stringify(data));
        }

        function alchLoadFromStorage() {
            var stored = localStorage.getItem(ALCH_STORAGE_KEY);
            if (stored) {
                try {
                    var data = JSON.parse(stored);
                    Object.keys(data).forEach(function(id) {
                        var input = document.getElementById(id);
                        if (input && input.closest('#tab-alchemy')) {
                            input.value = data[id];
                        }
                    });
                } catch (e) {
                    console.error('Failed to load alchemy data:', e);
                }
            }
        }

        // ===== ALCHEMY: CALCULATE =====
        function alchCalculate() {
            var ahCutPct = getVal('alch_ah_cut') / 100;
            var results = [];

            ALCHEMY_RECIPES.forEach(function(r) {
                var craftCost = 0;

                r.ingredients.forEach(function(ing) {
                    var baseId = 'alch_' + r.id + '_ing_' + sanitizeId(ing.item);
                    var ingCost;

                    if (ing.craftFrom) {
                        var buyPrice = getVal('alch_mat_' + sanitizeId(ing.item));
                        var motePrice = getVal('alch_mat_' + sanitizeId(ing.craftFrom.item));
                        var buyCost = buyPrice * ing.qty;
                        var moteCost = motePrice * ing.craftFrom.qty * ing.qty;
                        var useMotes = moteCost < buyCost;
                        ingCost = useMotes ? moteCost : buyCost;

                        // Update sourcing display
                        var buyLabel = document.getElementById(baseId + '_buy_label');
                        var buyPriceEl = document.getElementById(baseId + '_buy_price');
                        var craftLabel = document.getElementById(baseId + '_craft_label');
                        var craftPriceEl = document.getElementById(baseId + '_craft_price');
                        if (buyLabel) {
                            buyLabel.className = 'opt' + (!useMotes ? ' active' : '');
                            buyPriceEl.className = 'opt' + (!useMotes ? ' active' : '');
                            buyPriceEl.innerHTML = gold(buyCost) + (!useMotes ? '<span class="using">USING</span>' : '');
                            craftLabel.className = 'opt' + (useMotes ? ' active' : '');
                            craftPriceEl.className = 'opt' + (useMotes ? ' active' : '');
                            craftPriceEl.innerHTML = gold(moteCost) + (useMotes ? '<span class="using">USING</span>' : '');
                        }
                    } else {
                        var price;
                        if (ing.type === 'ah') {
                            price = getVal('alch_mat_' + sanitizeId(ing.item));
                        } else if (ing.type === 'vendor') {
                            price = getVal('alch_vendor_' + sanitizeId(ing.item));
                        }
                        ingCost = (price || 0) * ing.qty;

                        // Update ingredient cost in detail view
                        var costEl = document.getElementById(baseId);
                        if (costEl) costEl.textContent = gold(ingCost);
                    }

                    craftCost += ingCost;
                });

                var salePrice = getVal('alch_sale_' + r.id);
                var ahCut = salePrice * ahCutPct;
                var deposit = getVal('alch_deposit_' + r.id);
                var profit = salePrice - ahCut - craftCost;

                var el = function(id) { return document.getElementById(id); };
                var craftEl = el('alch_' + r.id + '_craft_cost');
                if (craftEl) craftEl.textContent = gold(craftCost);
                var saleEl = el('alch_' + r.id + '_sale_display');
                if (saleEl) saleEl.textContent = gold(salePrice);
                var cutEl = el('alch_' + r.id + '_ah_cut_display');
                if (cutEl) cutEl.textContent = gold(ahCut);
                var profitEl = el('alch_' + r.id + '_profit');
                if (profitEl) profitEl.innerHTML = '<span class="' + profitClass(profit) + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</span>';
                var depositEl = el('alch_' + r.id + '_deposit_note');
                if (depositEl) depositEl.textContent = 'Deposit: ' + gold(deposit) + ' (lost if unsold)';

                results.push({ recipe: r, craftCost: craftCost, salePrice: salePrice, profit: profit });
            });

            alchResults = results;
            procModalUpdate();
            results.forEach(function(r) {
                if (r.recipe.category !== 'transmute') procIlUpdate(r.recipe.id);
            });
            evCalculate();
            var hidden = getHiddenRecipes();
            var visibleResults = results.filter(function(r) { return !hidden[r.recipe.id]; });
            var batchAhCutPct = getVal('alch_ah_cut') / 100;
            if (alchBatchSize > 1) {
                visibleResults.forEach(function(r) {
                    var procMult = r.recipe.category !== 'transmute' ? (1 + alchProcRate / 100) : 1;
                    r._batchCost   = r.craftCost * alchBatchSize;
                    r._batchProfit = r.salePrice * (1 - batchAhCutPct) * alchBatchSize * procMult - r._batchCost;
                });
                sortResults(visibleResults, alchSortBy, '_batchProfit', '_batchCost');
            } else {
                sortResults(visibleResults, alchSortBy);
            }
            var tbody = '';
            visibleResults.forEach(function(r) {
                var isProcRecipe = r.recipe.category !== 'transmute';
                var procMult = (alchBatchSize > 1 && isProcRecipe) ? (1 + alchProcRate / 100) : 1;
                var displayCost   = r.craftCost * alchBatchSize;
                var displayRev    = alchBatchSize === 1 ? r.salePrice : r.salePrice * (1 - batchAhCutPct) * alchBatchSize * procMult;
                var displayProfit = alchBatchSize === 1 ? r.profit : displayRev - displayCost;
                var cls = profitClass(displayProfit);
                var pct = profitPctStr(displayProfit, displayCost);
                var procBtnHtml = isProcRecipe
                    ? '<button class="proc-btn" data-recipe="' + r.recipe.id + '" onclick="openProcModal(\'' + r.recipe.id + '\');event.stopPropagation()">Proc</button>'
                    : '';
                tbody += '<tr class="alch-summary-row" data-recipe="' + r.recipe.id + '">' +
                    '<td>' + stalenessDotHtml(getAlchRecipeStalenessInputs(r.recipe)) + r.recipe.name + procBtnHtml + '</td>' +
                    '<td>' + gold(displayCost) + '</td>' +
                    '<td>' + gold(displayRev) + '</td>' +
                    '<td class="' + cls + '">' + (displayProfit >= 0 ? '+' : '') + gold(displayProfit) + '</td>' +
                    '<td class="' + cls + '">' + pct + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(alchTsm, r.recipe.id, 'daily', 'alch') + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(alchTsm, r.recipe.id, 'avgPrice', 'alch') + '</td>' +
                '</tr>';
            });
            var summaryBody = document.getElementById('alch-summary-body');
            if (summaryBody && !(summaryBody.contains(document.activeElement) && document.activeElement.classList.contains('tsm-input'))) {
                summaryBody.innerHTML = tbody;
            }

            alchSaveToStorage();
        }

        function gearInit() {
            var ahItemsSet = {};
            var vendorItemsSet = {};
            var itemToRecipes = {};
            function collectGearItems(ing, recipeId) {
                if (ing.type === 'ah') {
                    ahItemsSet[ing.item] = true;
                    if (!itemToRecipes[ing.item]) itemToRecipes[ing.item] = [];
                    if (itemToRecipes[ing.item].indexOf(recipeId) === -1) itemToRecipes[ing.item].push(recipeId);
                } else if (ing.type === 'vendor') {
                    vendorItemsSet[ing.item] = true;
                    if (!itemToRecipes[ing.item]) itemToRecipes[ing.item] = [];
                    if (itemToRecipes[ing.item].indexOf(recipeId) === -1) itemToRecipes[ing.item].push(recipeId);
                }
                if (ing.craftFrom) {
                    if (ing.craftFrom.item) {
                        ahItemsSet[ing.craftFrom.item] = true;
                        if (!itemToRecipes[ing.craftFrom.item]) itemToRecipes[ing.craftFrom.item] = [];
                        if (itemToRecipes[ing.craftFrom.item].indexOf(recipeId) === -1) itemToRecipes[ing.craftFrom.item].push(recipeId);
                    } else if (ing.craftFrom.mats) {
                        ing.craftFrom.mats.forEach(function(mat) { collectGearItems(mat, recipeId); });
                    }
                }
            }
            getAllGearRecipes().forEach(function(r) {
                r.ingredients.forEach(function(ing) { collectGearItems(ing, r.id); });
            });

            var allAhItems = Object.keys(ahItemsSet).sort();
            var vendorItems = Object.keys(vendorItemsSet).sort();

            function gearTableRow(label, inputId, defaultValue, hasLock, locksKey, recipeIds) {
                var recipesAttr = recipeIds ? ' data-recipes="' + recipeIds.join(',') + '"' : '';
                var lockHTML = hasLock ? '<button class="lock-btn" data-input="' + inputId + '" data-locks-key="' + locksKey + '">&#x1f513;</button>' : '';
                return '<div class="price-table-row"' + recipesAttr + '>' +
                    '<span class="pt-name">' + label + '</span>' + lockHTML +
                    '<div class="price-control"><input type="number" id="' + inputId + '" value="' + defaultValue + '" step="0.0001"></div>' +
                    '<div class="gsc-group" data-input="' + inputId + '"><span class="gsc-val gold">0g</span><span class="gsc-val silver">0s</span><span class="gsc-val copper">0c</span></div>' +
                '</div>';
            }

            function gearCollapsibleH2(label, panelId) {
                return '<h2 class="collapsible" data-panel="gear-' + panelId + '">' + label + '<span class="collapse-arrow">&#9660;</span></h2>';
            }

            // === LEFT COLUMN: AH Materials + Import ===
            var colLeft = '';
            colLeft += buildGearRecipeDropdownHTML();

            if (allAhItems.length > 0) {
                colLeft += '<div class="panel gear-filterable">' + gearCollapsibleH2('AH Materials', 'ah-mats') + '<div class="panel-body" data-panel-body="gear-ah-mats"><div class="price-table">';
                allAhItems.forEach(function(item) {
                    var inputId = 'gear_mat_' + sanitizeId(item);
                    gearNameToInput[item] = inputId;
                    colLeft += gearTableRow(item, inputId, 0, true, GEAR_LOCKS_KEY, itemToRecipes[item]);
                });
                colLeft += '</div></div></div>';
            }

            // === RIGHT COLUMN: Sale Prices + Deposits & Settings ===
            var colRight = '';
            colRight += '<div class="panel gear-filterable">' + gearCollapsibleH2('Product Sale Prices', 'sale-prices') + '<div class="panel-body" data-panel-body="gear-sale-prices"><div class="price-table">';
            getAllGearRecipes().forEach(function(r) {
                var inputId = 'gear_sale_' + r.id;
                var productName = r.product || r.name;
                gearNameToInput[productName] = inputId;
                colRight += gearTableRow(productName, inputId, 0, true, GEAR_LOCKS_KEY, [r.id]);
            });
            colRight += '</div></div></div>';

            colRight += '<div class="panel gear-filterable">' + gearCollapsibleH2('Deposits & Settings', 'deposits') + '<div class="panel-body" data-panel-body="gear-deposits"><div class="price-table">';
            getAllGearRecipes().forEach(function(r) {
                var inputId = 'gear_deposit_' + r.id;
                var productName = r.product || r.name;
                colRight += gearTableRow(productName + ' (deposit)', inputId, DEPOSIT_DEFAULTS[inputId] || 0, false, null, [r.id]);
            });
            if (vendorItems.length > 0) {
                vendorItems.forEach(function(item) {
                    var inputId = 'gear_vendor_' + sanitizeId(item);
                    var defaultPrice = VENDOR_DEFAULTS[item] || 0;
                    colRight += gearTableRow(item + ' (vendor)', inputId, defaultPrice, false, null, itemToRecipes[item]);
                });
            }
            colRight += '<div class="price-table-row"><span class="pt-name">AH Cut</span><div class="price-control"><input type="number" id="gear_ah_cut" value="5" step="0.1"><span style="color: #888; font-size: 0.82em; margin-left: 2px;">%</span></div></div>';
            colRight += '</div></div></div>';

            document.getElementById('gear-col-left').innerHTML = colLeft;
            document.getElementById('gear-col-right').innerHTML = colRight;

            var main = buildGearAllViewHTML();

        // ===== GEAR: IMPORT =====
        function gearImportPrices() {
            var textarea = document.getElementById('gear_ah_import');
            var status = document.getElementById('gear_import_status');
            var text = textarea.value.trim();
            if (!text) { status.textContent = 'Paste AH data first'; status.style.color = '#f87171'; return; }

            var locks = getLocks(GEAR_LOCKS_KEY);
            var lines = text.split('\n');
            var updated = 0, skipped = 0, skippedNames = [];

            for (var i = 0; i < lines.length; i++) {
                var match = lines[i].match(/^"?(\d+)"?,\s*"([^"]+)"/);
                if (!match) continue;
                var copperPrice = parseInt(match[1]);
                var name = match[2];
                var inputId = gearNameToInput[name] || gearNameToInput[name.replace(/\s*\(\d+\)$/, '')];
                if (!inputId) continue;
                if (locks[inputId]) { skipped++; skippedNames.push(name); continue; }
                var goldPrice = Math.round(copperPrice) / 10000;
                var input = document.getElementById(inputId);
                if (input) { input.value = goldPrice; updateGSCDisplay(inputId); autoSizeInput(input); updated++; }
            }

            syncAllSharedPrices();
            calculateCoreTabs();
            var msg = 'Updated ' + updated + ' price' + (updated !== 1 ? 's' : '');
            if (skipped > 0) msg += ', ' + skipped + ' locked (' + skippedNames.join(', ') + ')';
            status.textContent = msg;
            status.style.color = '#4ade80';
        }

        // ===== GEAR: SAVE / LOAD =====
        function gearSaveToStorage() {
            var data = {};
            document.querySelectorAll('#tab-gear input').forEach(function(input) { if (input.id) data[input.id] = input.value; });
            localStorage.setItem(GEAR_STORAGE_KEY, JSON.stringify(data));
        }

        function gearLoadFromStorage() {
            var stored = localStorage.getItem(GEAR_STORAGE_KEY);
            if (stored) {
                try {
                    var data = JSON.parse(stored);
                    Object.keys(data).forEach(function(id) {
                        var input = document.getElementById(id);

        // ===== GEAR: CALCULATE =====

        // Recursive ingredient cost calculator — updates DOM sourcing display and returns best cost
        function computeGearIngCost(ing, recipeId, totalQty) {
            var baseId = 'gear_' + recipeId + '_ing_' + sanitizeId(ing.item);

            if (ing.type === 'bop') return 0;

            if (ing.craftFrom && ing.craftFrom.item) {
                var buyCost = getVal('gear_mat_' + sanitizeId(ing.item)) * totalQty;
                var craftCost = getVal('gear_mat_' + sanitizeId(ing.craftFrom.item)) * ing.craftFrom.qty * totalQty;
                var useCraft = craftCost < buyCost;
                var buyLbl = document.getElementById(baseId + '_buy_label');
                if (buyLbl) {
                    var buyPEl = document.getElementById(baseId + '_buy_price');
                    var craftLbl = document.getElementById(baseId + '_craft_label');
                    var craftPEl = document.getElementById(baseId + '_craft_price');
                    buyLbl.className = 'opt' + (!useCraft ? ' active' : '');
                    buyPEl.className = 'opt' + (!useCraft ? ' active' : '');
                    buyPEl.innerHTML = gold(buyCost) + (!useCraft ? '<span class="using">USING</span>' : '');
                    craftLbl.className = 'opt' + (useCraft ? ' active' : '');
                    craftPEl.className = 'opt' + (useCraft ? ' active' : '');
                    craftPEl.innerHTML = gold(craftCost) + (useCraft ? '<span class="using">USING</span>' : '');
                }
                return useCraft ? craftCost : buyCost;
            }

            if (ing.craftFrom && ing.craftFrom.mats) {
                // Tiered: buy AH vs craft from sub-mats (recurse)
                var buyCost = getVal('gear_mat_' + sanitizeId(ing.item)) * totalQty;
                var craftSubCost = 0;
                ing.craftFrom.mats.forEach(function(mat) {
                    craftSubCost += computeGearIngCost(mat, recipeId, totalQty * mat.qty);
                });
                var useCraft = craftSubCost < buyCost;
                var buyLbl = document.getElementById(baseId + '_buy_label');
                if (buyLbl) {
                    var buyPEl = document.getElementById(baseId + '_buy_price');
                    var craftLbl = document.getElementById(baseId + '_craft_label');
                    var craftPEl = document.getElementById(baseId + '_craft_price');
                    buyLbl.className = 'opt' + (!useCraft ? ' active' : '');
                    buyPEl.className = 'opt' + (!useCraft ? ' active' : '');
                    buyPEl.innerHTML = gold(buyCost) + (!useCraft ? '<span class="using">USING</span>' : '');
                    craftLbl.className = 'opt' + (useCraft ? ' active' : '');
                    craftPEl.className = 'opt' + (useCraft ? ' active' : '');
                    craftPEl.innerHTML = gold(craftSubCost) + (useCraft ? '<span class="using">USING</span>' : '');
                }
                return useCraft ? craftSubCost : buyCost;
            }

            var price = ing.type === 'vendor'
                ? getVal('gear_vendor_' + sanitizeId(ing.item))
                : getVal('gear_mat_' + sanitizeId(ing.item));
            var cost = (price || 0) * totalQty;
            var costEl = document.getElementById(baseId);
            if (costEl) costEl.textContent = gold(cost);
            return cost;
        }

        function gearCalculate() {
            var ahCutPct = getVal('gear_ah_cut') / 100;
            var results = [];

            getAllGearRecipes().forEach(function(r) {
                var craftCost = 0;
                r.ingredients.forEach(function(ing) {
                    craftCost += computeGearIngCost(ing, r.id, ing.qty);
                });

                var salePrice = getVal('gear_sale_' + r.id);
                var ahCut = salePrice * ahCutPct;
                var deposit = getVal('gear_deposit_' + r.id);
                var profit = salePrice - ahCut - craftCost;

                var elById = function(id) { return document.getElementById(id); };
                var craftEl = elById('gear_' + r.id + '_craft_cost'); if (craftEl) craftEl.textContent = gold(craftCost);
                var saleEl = elById('gear_' + r.id + '_sale_display'); if (saleEl) saleEl.textContent = gold(salePrice);
                var cutEl = elById('gear_' + r.id + '_ah_cut_display'); if (cutEl) cutEl.textContent = gold(ahCut);
                var profitEl = elById('gear_' + r.id + '_profit');
                if (profitEl) profitEl.innerHTML = '<span class="' + profitClass(profit) + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</span>';
                var depositEl = elById('gear_' + r.id + '_deposit_note');
                if (depositEl) depositEl.textContent = 'Deposit: ' + gold(deposit) + ' (lost if unsold)';

                // Profit per BOP item
                var bopIng = r.ingredients.find(function(i) { return i.type === 'bop'; });
                if (bopIng && depositEl) {
                    var profitPerBop = profit / bopIng.qty;
                    var bopNoteId = 'gear_' + r.id + '_bop_note';
                    var existing = elById(bopNoteId);
                    var bopHtml = '<div class="card-row highlight" id="' + bopNoteId + '" style="border-top:none; margin-top:4px; padding-top:4px;">' +
                        '<span class="label">Profit per ' + bopIng.item + '</span>' +
                        '<span class="value"><span class="' + profitClass(profitPerBop) + '">' + (profitPerBop >= 0 ? '+' : '') + gold(profitPerBop) + '</span></span>' +
                    '</div>';
                    if (existing) { existing.outerHTML = bopHtml; } else { depositEl.insertAdjacentHTML('beforebegin', bopHtml); }
                }

                results.push({ recipe: r, craftCost: craftCost, salePrice: salePrice, profit: profit });
            });

            gearResults = results;
            var summaryRows = results.map(function(r) {
                return {
                    recipeId: r.recipe.id,
                    recipeName: r.recipe.name,
                    craftCost: r.craftCost,
                    salePrice: r.salePrice,
                    profit: r.profit,
                    stalenessInputs: getGearRecipeStalenessInputs(r.recipe),
                    tsmId: r.recipe.id
                };
            });
            sortResults(summaryRows, gearSortBy);
            var tbody = '';
            summaryRows.forEach(function(r) {
                var cls = profitClass(r.profit);
                var pct = profitPctStr(r.profit, r.craftCost);
                var tsmDaily = r.tsmId ? tsmInputHtml(gearTsm, r.tsmId, 'daily', 'gear') : '—';
                var tsmAvg = r.tsmId ? tsmInputHtml(gearTsm, r.tsmId, 'avgPrice', 'gear') : '—';
                tbody += '<tr class="gear-summary-row" data-recipe="' + r.recipeId + '">' +
                    '<td>' + stalenessDotHtml(r.stalenessInputs) + r.recipeName + '</td>' +
                    '<td>' + gold(r.craftCost) + '</td>' +
                    '<td>' + gold(r.salePrice) + '</td>' +
                    '<td class="' + cls + '">' + (r.profit >= 0 ? '+' : '') + gold(r.profit) + '</td>' +
                    '<td class="' + cls + '">' + pct + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmDaily + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmAvg + '</td>' +
                '</tr>';
            });
            var summaryBody = document.getElementById('gear-summary-body');
            if (summaryBody && !(summaryBody.contains(document.activeElement) && document.activeElement.classList.contains('tsm-input'))) {
                summaryBody.innerHTML = tbody;
            }

            gearSaveToStorage();
            evCalculate();
        }

        // ===== TRANSMUTES / DAILIES: CALCULATE =====
        function txCalculate() {
            var ahCutEl = document.getElementById('tx_ah_cut');
            if (!ahCutEl) return; // not yet initialized
            var ahCutPct = parseFloat(ahCutEl.value) / 100 || 0.05;

            function txGet(id) { var el = document.getElementById(id); return el ? (parseFloat(el.value) || 0) : 0; }
            function txSet(id, html) { var el = document.getElementById(id); if (el) el.innerHTML = html; }
            function txText(id, text) { var el = document.getElementById(id); if (el) el.textContent = text; }

            // Imbued bolt optimal cost (buy vs craft from bolt of NW × 3 + dust × 2)
            var imbuedBoltAH   = txGet('tx_imbued_bolt');
            var boltNwAH       = txGet('tx_bolt_nw');
            var clothPrice     = txGet('tx_cloth');
            var dustPrice      = txGet('tx_dust');
            var boltNwCraft    = clothPrice * 6;
            var boltNwBest     = Math.min(boltNwAH, boltNwCraft);
            var imbuedCraft    = boltNwBest * 3 + dustPrice * 2;
            var imbuedBest     = Math.min(imbuedBoltAH, imbuedCraft);
            var useImbuedCraft = imbuedCraft < imbuedBoltAH;

            txSummaryRows = [];
            var summaryRows = txSummaryRows;

            // === MOTE → PRIMAL TABLE ===
            var primalDeposit = txGet('tx_deposit_primal');
            var moteTableBody = '';
            TX_PRIMALS.forEach(function(p) {
                var moteCost    = txGet('tx_mote_' + p.id) * 10;
                var primalPrice = txGet('tx_primal_' + p.id);
                var revenue     = primalPrice * (1 - ahCutPct);
                var profit      = revenue - moteCost;
                var cls         = profitClass(profit);
                moteTableBody += '<tr class="tx-summary-row" data-recipe="mote_primals">' +
                    '<td>' + stalenessDotHtml(getTxStalenessInputs('mote_primals', p.id)) + p.primal + '</td>' +
                    '<td>' + gold(moteCost) + '</td>' +
                    '<td>' + gold(primalPrice) + '</td>' +
                    '<td>' + gold(revenue) + '</td>' +
                    '<td style="color:#888">' + gold(primalDeposit) + '</td>' +
                    '<td class="' + cls + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</td>' +
                '</tr>';
                if (moteCost > 0 || primalPrice > 0) {
                    summaryRows.push({ label: p.primal, cost: moteCost, revenue: revenue, profit: profit, recipeId: 'mote_primals', primalId: p.id });
                }
            });
            var moteEl = document.getElementById('tx-mote-table-body');
            if (moteEl) moteEl.innerHTML = moteTableBody;

            // === PLANAR ESSENCE ===
            var lesserCost  = txGet('tx_lesser_planar') * 3;
            var greaterSell = txGet('tx_greater_planar');
            var planarRev   = greaterSell * (1 - ahCutPct);
            var planarProf  = planarRev - lesserCost;
            txText('tx_planar_lesser_cost', gold(lesserCost));
            txText('tx_planar_craft_cost',  gold(lesserCost));
            txText('tx_planar_sale',        gold(greaterSell));
            txText('tx_planar_ah_cut',      gold(greaterSell * ahCutPct));
            txSet('tx_planar_profit', '<span class="' + profitClass(planarProf) + '">' + (planarProf >= 0 ? '+' : '') + gold(planarProf) + '</span>');

            var planarBody = '<tr class="tx-summary-row" data-recipe="planar_essence">' +
                '<td>' + stalenessDotHtml(getTxStalenessInputs('planar_essence')) + '3\u00d7 Lesser \u2192 Greater Planar</td>' +
                '<td>' + gold(lesserCost) + '</td>' +
                '<td>' + gold(greaterSell) + '</td>' +
                '<td>' + gold(planarRev) + '</td>' +
                '<td class="' + profitClass(planarProf) + '">' + (planarProf >= 0 ? '+' : '') + gold(planarProf) + '</td>' +
            '</tr>';
            var planarInlineEl = document.getElementById('tx-planar-inline-body');
            if (planarInlineEl) planarInlineEl.innerHTML = planarBody;
            summaryRows.push({ label: 'Planar Essence', cost: lesserCost, revenue: planarRev, profit: planarProf, recipeId: 'planar_essence' });

            // === TRANSMUTE RECIPES ===
            TRANSMUTE_RECIPES.forEach(function(r) {
                var craftCost = 0;
                r.ingredients.forEach(function(ing) {
                    var baseId = 'tx_' + r.id + '_ing_' + sanitizeId(ing.item);
                    if (ing.type === 'primal') {
                        var buyPrice   = txGet('tx_primal_' + ing.primalId) * ing.qty;
                        var p          = TX_PRIMALS.find(function(pr) { return pr.id === ing.primalId; });
                        var motePrice  = p ? txGet('tx_mote_' + ing.primalId) * 10 * ing.qty : buyPrice;
                        var useMotes   = motePrice < buyPrice;
                        craftCost += useMotes ? motePrice : buyPrice;
                        var buyLbl = document.getElementById(baseId + '_buy_label');
                        if (buyLbl) {
                            var buyPEl   = document.getElementById(baseId + '_buy_price');
                            var craftLbl = document.getElementById(baseId + '_craft_label');
                            var craftPEl = document.getElementById(baseId + '_craft_price');
                            buyLbl.className   = 'opt' + (!useMotes ? ' active' : '');
                            buyPEl.className   = 'opt' + (!useMotes ? ' active' : '');
                            buyPEl.innerHTML   = gold(buyPrice)  + (!useMotes ? '<span class="using">USING</span>' : '');
                            craftLbl.className = 'opt' + (useMotes ? ' active' : '');
                            craftPEl.className = 'opt' + (useMotes ? ' active' : '');
                            craftPEl.innerHTML = gold(motePrice) + (useMotes  ? '<span class="using">USING</span>' : '');
                        }
                    } else {
                        var gemCost = txGet('tx_gem_' + sanitizeId(ing.item)) * ing.qty;
                        craftCost += gemCost;
                        txText(baseId, gold(gemCost));
                    }
                });

                var salePrice = txGet('tx_sale_' + r.id);
                var ahCut     = salePrice * ahCutPct;
                var deposit   = txGet('tx_deposit_' + r.id);
                var profit    = salePrice - ahCut - craftCost;

                txText('tx_' + r.id + '_craft_cost',       gold(craftCost));
                txText('tx_' + r.id + '_sale_display',     gold(salePrice));
                txText('tx_' + r.id + '_ah_cut_display',   gold(ahCut));
                txSet('tx_' + r.id + '_profit', '<span class="' + profitClass(profit) + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</span>');
                txText('tx_' + r.id + '_deposit_note', 'Deposit: ' + gold(deposit) + ' (lost if unsold)');

                summaryRows.push({ label: r.name + ' (transmute)', cost: craftCost, revenue: salePrice - ahCut, profit: profit, recipeId: r.id });
            });

            // === CLOTH DAILIES ===
            CLOTH_DAILIES.forEach(function(r) {
                var craftCost = 0;

                r.ingredients.forEach(function(ing) {
                    var baseId = 'tx_' + r.id + '_ing_' + sanitizeId(ing.item);
                    if (ing.type === 'imbued_bolt') {
                        var boltCostDisplay = imbuedBest;
                        craftCost += imbuedBest;

                        var buyLbl = document.getElementById(baseId + '_buy_label');
                        if (buyLbl) {
                            var buyPEl   = document.getElementById(baseId + '_buy_price');
                            var craftLbl = document.getElementById(baseId + '_craft_label');
                            var craftPEl = document.getElementById(baseId + '_craft_price');
                            buyLbl.className   = 'opt' + (!useImbuedCraft ? ' active' : '');
                            buyPEl.className   = 'opt' + (!useImbuedCraft ? ' active' : '');
                            buyPEl.innerHTML   = gold(imbuedBoltAH) + (!useImbuedCraft ? '<span class="using">USING</span>' : '');
                            craftLbl.className = 'opt' + (useImbuedCraft ? ' active' : '');
                            craftPEl.className = 'opt' + (useImbuedCraft ? ' active' : '');
                            craftPEl.innerHTML = gold(imbuedCraft) + (useImbuedCraft ? '<span class="using">USING</span>' : '');
                            txText(baseId + '_bolt_cost', gold(boltNwBest * 3));
                            txText(baseId + '_dust_cost', gold(dustPrice * 2));
                        }
                    } else if (ing.type === 'primal') {
                        var buyPrice  = txGet('tx_primal_' + ing.primalId) * ing.qty;
                        var p         = TX_PRIMALS.find(function(pr) { return pr.id === ing.primalId; });
                        var motePrice = p ? txGet('tx_mote_' + ing.primalId) * 10 * ing.qty : buyPrice;
                        var useMotes  = motePrice < buyPrice;
                        craftCost += useMotes ? motePrice : buyPrice;

                        var buyLbl = document.getElementById(baseId + '_buy_label');
                        if (buyLbl) {
                            var buyPEl   = document.getElementById(baseId + '_buy_price');
                            var craftLbl = document.getElementById(baseId + '_craft_label');
                            var craftPEl = document.getElementById(baseId + '_craft_price');
                            buyLbl.className   = 'opt' + (!useMotes ? ' active' : '');
                            buyPEl.className   = 'opt' + (!useMotes ? ' active' : '');
                            buyPEl.innerHTML   = gold(buyPrice)  + (!useMotes ? '<span class="using">USING</span>' : '');
                            craftLbl.className = 'opt' + (useMotes ? ' active' : '');
                            craftPEl.className = 'opt' + (useMotes ? ' active' : '');
                            craftPEl.innerHTML = gold(motePrice) + (useMotes  ? '<span class="using">USING</span>' : '');
                        }
                    }
                });

                var salePerUnit = txGet('tx_sale_' + r.id);
                var totalRevenue = salePerUnit * r.yieldQty * (1 - ahCutPct);
                var totalAhCut   = salePerUnit * r.yieldQty * ahCutPct;
                var deposit      = txGet('tx_deposit_' + r.id);
                var totalProfit  = totalRevenue - craftCost;
                var profitPer    = totalProfit / r.yieldQty;

                txText('tx_' + r.id + '_craft_cost', gold(craftCost));
                txText('tx_' + r.id + '_ah_cut_display', gold(totalAhCut));
                txSet('tx_' + r.id + '_profit', '<span class="' + profitClass(totalProfit) + '">' + (totalProfit >= 0 ? '+' : '') + gold(totalProfit) + '</span>');
                txText('tx_' + r.id + '_deposit_note', 'Deposit: ' + gold(deposit) + ' (lost if unsold)');

                if (r.yieldQty > 1) {
                    txText('tx_' + r.id + '_revenue', gold(totalRevenue));
                    txSet('tx_' + r.id + '_profit_per', '<span class="' + profitClass(profitPer) + '">' + (profitPer >= 0 ? '+' : '') + gold(profitPer) + '</span>');
                } else {
                    txText('tx_' + r.id + '_sale_display', gold(salePerUnit));
                }

                var summaryLabel = r.name + (r.yieldQty > 1 ? ' (\u00d7' + r.yieldQty + ')' : '');
                summaryRows.push({ label: summaryLabel, cost: craftCost, revenue: totalRevenue, profit: totalProfit, recipeId: r.id });
            });

            // === SUMMARY TABLE ===
            sortResults(summaryRows, txSortBy, 'profit', 'cost');
            var tbody = '';
            summaryRows.forEach(function(row) {
                var cls = profitClass(row.profit);
                var pct = profitPctStr(row.profit, row.cost);
                tbody += '<tr class="tx-summary-row" data-recipe="' + row.recipeId + '">' +
                    '<td>' + stalenessDotHtml(getTxStalenessInputs(row.recipeId, row.primalId)) + row.label + '</td>' +
                    '<td>' + gold(row.cost) + '</td>' +
                    '<td>' + gold(row.revenue) + '</td>' +
                    '<td class="' + cls + '">' + (row.profit >= 0 ? '+' : '') + gold(row.profit) + '</td>' +
                    '<td class="' + cls + '">' + pct + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(txTsm, row.recipeId, 'daily', 'tx') + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(txTsm, row.recipeId, 'avgPrice', 'tx') + '</td>' +
                '</tr>';
            });
            var summaryBody = document.getElementById('tx-summary-body');
            if (summaryBody && !(summaryBody.contains(document.activeElement) && document.activeElement.classList.contains('tsm-input'))) {
                summaryBody.innerHTML = tbody;
            }

            txSaveToStorage();
            evCalculate();
        }

        // ===== TRANSMUTES / DAILIES: SELECT =====
        function txSelectRecipe(recipeId) {
            var dropdown = document.getElementById('tx-recipe-dropdown');
            syncRecipeDropdownSelection('#tx-recipe-dropdown', 'tx-recipe-dropdown-label', recipeId);
            if (dropdown) dropdown.classList.remove('open');

        // ===== AUCTIONATOR EXPORT =====
        function txGenerateExport() {
            function formatList(name, arr) {
                var seen = {}, unique = [];
                arr.forEach(function(item) {
                    var k = item.toLowerCase();
                    if (!seen[k]) { seen[k] = true; unique.push(item); }
                });
                if (unique.length === 0) return null;
                return name + '^' + unique.map(function(i) { return '"' + i + '"'; }).join('^');
            }

            function gearIngItems(ing) {
                if (ing.type === 'bop' || ing.type === 'vendor') return [];
                var items = [ing.item];
                if (ing.craftFrom) {
                    if (ing.craftFrom.item) items.push(ing.craftFrom.item);
                    else if (ing.craftFrom.mats) ing.craftFrom.mats.forEach(function(mat) { gearIngItems(mat).forEach(function(i) { items.push(i); }); });
                }
                return items;
            }

            function alchName(recipe) {
                var name = recipe.product || recipe.name;
                if (recipe.category === 'elixir') return name.startsWith('Elixir ') ? name : 'Elixir - ' + name;
                if (recipe.category === 'potion') return 'Potion - ' + name;
                if (recipe.category === 'flask')  return name.startsWith('Flask ')  ? name : 'Flask - ' + name;
                if (recipe.category === 'misc')   return name;
                return name;
            }

            var lines = [];

            // 1.0 ALL BAGS
            lines.push(formatList('1.0 ALL BAGS', BAGS_EXPORT_ITEMS));

            // 2.x Tailoring
            var tailAll = [], bopAll = [];
            GEAR_RECIPES.forEach(function(r) {
                var items = [r.product || r.name];
                r.ingredients.forEach(function(ing) { gearIngItems(ing).forEach(function(i) { items.push(i); }); });
                items.forEach(function(i) { tailAll.push(i); });
                if (r.ingredients.some(function(i) { return i.type === 'bop'; })) items.forEach(function(i) { bopAll.push(i); });
                lines.push(formatList('2.1 ' + (r.product || r.name), items));
            });
            if (bopAll.length > 0) lines.push(formatList('2.1 ALL PRIMAL NETHER', bopAll));
            lines.push(formatList('2.0 ALL TAILORING', tailAll));

            // 3.x Alchemy
            var alchAll = [];
            ['elixir', 'potion', 'flask', 'misc'].forEach(function(cat, idx) {
                var sub     = ['3.1', '3.2', '3.3', '3.4'][idx];
                var allLbl  = ['ALL ELIXIRS', 'ALL POTIONS', 'ALL FLASKS', 'ALL MISC'][idx];
                var catItems = [];
                ALCHEMY_RECIPES.filter(function(r) { return r.category === cat; }).forEach(function(r) {
                    var items = [r.product || r.name];
                    r.ingredients.forEach(function(ing) {
                        if (ing.type === 'vendor' || ing.type === 'bop') return;
                        items.push(ing.item);
                        if (ing.craftFrom && ing.craftFrom.item) items.push(ing.craftFrom.item);
                    });
                    items.forEach(function(i) { catItems.push(i); alchAll.push(i); });
                    lines.push(formatList(sub + ' ' + alchName(r), items));
                });
                lines.push(formatList(sub + ' ' + allLbl, catItems));
            });
            lines.push(formatList('3.0 ALL ALCHEMY', alchAll));

            // 4.x Transmutes/Dailies
            var txAll = [];

            // 4.1 ALL MOTE TO PRIMALS
            var moteItems = [];
            TX_PRIMALS.forEach(function(p) { moteItems.push(p.mote); moteItems.push(p.primal); });
            moteItems.push('Lesser Planar Essence'); moteItems.push('Greater Planar Essence');
            moteItems.forEach(function(i) { txAll.push(i); });
            lines.push(formatList('4.1 ALL MOTE TO PRIMALS', moteItems));

            // 4.2 individual transmutes + ALL
            var transmAll = [];
            TRANSMUTE_RECIPES.forEach(function(r) {
                var items = [r.product || r.name];
                r.ingredients.forEach(function(ing) {
                    items.push(ing.item);
                    if (ing.type === 'primal') {
                        var p = TX_PRIMALS.find(function(pr) { return pr.id === ing.primalId; });
                        if (p) items.push(p.mote);
                    }
                });
                items.forEach(function(i) { transmAll.push(i); txAll.push(i); });
                lines.push(formatList('4.2 Transmute - ' + (r.product || r.name), items));
            });
            lines.push(formatList('4.2 ALL TRANSMUTES', transmAll));

            // 4.3 individual cloth dailies + ALL
            var clothAll = [];
            CLOTH_DAILIES.forEach(function(r) {
                var items = [r.name];
                r.ingredients.forEach(function(ing) {
                    items.push(ing.item);
                    if (ing.type === 'primal') {
                        var p = TX_PRIMALS.find(function(pr) { return pr.id === ing.primalId; });
                        if (p) items.push(p.mote);
                    }
                    if (ing.type === 'imbued_bolt') {
                        items.push('Bolt of Netherweave');
                        items.push('Netherweave Cloth');
                        items.push('Arcane Dust');
                    }
                });
                items.forEach(function(i) { clothAll.push(i); txAll.push(i); });
                lines.push(formatList('4.3 Cloth - ' + r.name, items));
            });
            lines.push(formatList('4.3 ALL CLOTH DAILIES', clothAll));
            lines.push(formatList('4.0 ALL TRANSMUTES/DAILIES', txAll));

            // 5.x Cooking
            var cookAll = [];
            COOKING_RECIPES.forEach(function(r) {
                var items = [r.name];
                r.ingredients.forEach(function(ing) {
                    if (ing.type !== 'vendor') items.push(ing.item);
                });
                items.forEach(function(i) { cookAll.push(i); });
                lines.push(formatList('5.1 ' + r.name, items));
            });
            lines.push(formatList('5.0 ALL COOKING', cookAll));

            // 6.x Enchanting
            var enchAll = [];
            ENCHANTING_CATEGORY_ORDER.forEach(function(cat, idx) {
                var sub    = ['6.1', '6.2'][idx];
                var allLbl = ['ALL SHARDS', 'ALL OILS'][idx];
                var catItems = [];
                ENCHANTING_RECIPES.filter(function(r) { return cat.includes.indexOf(r.category) !== -1; }).forEach(function(r) {
                    var items = [r.name];
                    r.ingredients.forEach(function(ing) {
                        if (ing.type !== 'vendor') items.push(ing.item);
                    });
                    items.forEach(function(i) { catItems.push(i); enchAll.push(i); });
                    lines.push(formatList(sub + ' ' + r.name, items));
                });
                if (catItems.length > 0) lines.push(formatList(sub + ' ' + allLbl, catItems));
            });
            lines.push(formatList('6.0 ALL ENCHANTING', enchAll));

            // 7.x Leatherworking
            var lwAll = [];
            LW_RECIPES.forEach(function(r) {
                var items = [r.name];
                r.ingredients.forEach(function(ing) {
                    if (ing.type === 'vendor' || ing.type === 'bop') return;
                    items.push(ing.item);
                    if (ing.craftFrom && ing.craftFrom.item) items.push(ing.craftFrom.item);
                });
                items.forEach(function(i) { lwAll.push(i); });
                lines.push(formatList('7.1 ' + r.name, items));
            });
            lines.push(formatList('7.0 ALL LEATHERWORKING', lwAll));

            // 0.0 EVERYTHING (all AH items across all tabs, no dupes)
            var everythingItems = [];
            BAGS_EXPORT_ITEMS.forEach(function(i) { everythingItems.push(i); });
            tailAll.forEach(function(i) { everythingItems.push(i); });
            alchAll.forEach(function(i) { everythingItems.push(i); });
            txAll.forEach(function(i) { everythingItems.push(i); });
            cookAll.forEach(function(i) { everythingItems.push(i); });
            enchAll.forEach(function(i) { everythingItems.push(i); });
            lwAll.forEach(function(i) { everythingItems.push(i); });
            lines.unshift(formatList('0.0 EVERYTHING', everythingItems));

            var output = lines.filter(function(l) { return l; }).join('\n');
            var textarea = document.getElementById('global_export_output');
            if (textarea) textarea.value = output;
        }

        // ===== COOKING: CALCULATE =====
        function cookCalculate() {
            var ahCutEl = document.getElementById('cook_ah_cut');
            if (!ahCutEl) return;
            var ahCutPct = parseFloat(ahCutEl.value) / 100 || 0.05;
            var results = [];

            COOKING_RECIPES.forEach(function(r) {
                var craftCost = 0;
                r.ingredients.forEach(function(ing) {
                    var baseId = 'cook_' + r.id + '_ing_' + sanitizeId(ing.item);
                    var price = ing.type === 'vendor'
                        ? (parseFloat(document.getElementById('cook_vendor_' + sanitizeId(ing.item)) ? document.getElementById('cook_vendor_' + sanitizeId(ing.item)).value : 0) || 0)
                        : (parseFloat(document.getElementById('cook_mat_' + sanitizeId(ing.item)) ? document.getElementById('cook_mat_' + sanitizeId(ing.item)).value : 0) || 0);
                    var ingCost = price * ing.qty;
                    craftCost += ingCost;
                    var costEl = document.getElementById(baseId);
                    if (costEl) costEl.textContent = gold(ingCost);
                });

                var saleEl    = document.getElementById('cook_sale_' + r.id);
                var salePrice = saleEl ? (parseFloat(saleEl.value) || 0) : 0;
                var ahCut     = salePrice * ahCutPct;
                var deposit   = parseFloat((document.getElementById('cook_deposit_' + r.id) || {}).value) || 0;
                var profit    = salePrice - ahCut - craftCost;

                var el = function(id) { return document.getElementById(id); };
                var craftEl   = el('cook_' + r.id + '_craft_cost');    if (craftEl)   craftEl.textContent   = gold(craftCost);
                var saleDEl   = el('cook_' + r.id + '_sale_display');  if (saleDEl)   saleDEl.textContent   = gold(salePrice);
                var cutEl     = el('cook_' + r.id + '_ah_cut_display');if (cutEl)     cutEl.textContent     = gold(ahCut);
                var profitEl  = el('cook_' + r.id + '_profit');
                if (profitEl) profitEl.innerHTML = '<span class="' + profitClass(profit) + '">' + (profit >= 0 ? '+' : '') + gold(profit) + '</span>';
                var depEl     = el('cook_' + r.id + '_deposit_note');  if (depEl) depEl.textContent = 'Deposit: ' + gold(deposit) + ' (lost if unsold)';

                results.push({ recipe: r, craftCost: craftCost, salePrice: salePrice, profit: profit });
            });

            cookResults = results;
            sortResults(results, cookSortBy);
            var tbody = '';
            results.forEach(function(r) {
                var cls = profitClass(r.profit);
                var pct = profitPctStr(r.profit, r.craftCost);
                var nameHtml = stalenessDotHtml(getCookRecipeStalenessInputs(r.recipe)) + r.recipe.name;
                if (r.recipe.id === 'smoked_desert_dumplings') {
                    nameHtml += ' <span style="color:#f87171;cursor:help;" title="Worse version of Roasted Clefthoof — provides the same buff without Spirit, but is typically more expensive and far less traded">(!)</span>';
                }
                tbody += '<tr class="cook-summary-row" data-recipe="' + r.recipe.id + '">' +
                    '<td>' + nameHtml + '</td>' +
                    '<td>' + gold(r.craftCost) + '</td>' +
                    '<td>' + gold(r.salePrice) + '</td>' +
                    '<td class="' + cls + '">' + (r.profit >= 0 ? '+' : '') + gold(r.profit) + '</td>' +
                    '<td class="' + cls + '">' + pct + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(cookTsm, r.recipe.id, 'daily', 'cook') + '</td>' +
                    '<td onclick="event.stopPropagation()">' + tsmInputHtml(cookTsm, r.recipe.id, 'avgPrice', 'cook') + '</td>' +
                '</tr>';
            });
            var summaryBody = document.getElementById('cook-summary-body');
            if (summaryBody && !(summaryBody.contains(document.activeElement) && document.activeElement.classList.contains('tsm-input'))) {
                summaryBody.innerHTML = tbody;
            }

            cookSaveToStorage();
            evCalculate();
        }
